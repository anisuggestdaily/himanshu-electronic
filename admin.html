<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* LOGIN BOX */
.login-box{
max-width:350px;
margin:80px auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

/* DASHBOARD */
.dashboard{
max-width:1100px;
margin:auto;
padding:20px;
}

/* CARDS */
.admin-card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

/* TOP BAR */
.top-bar{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:10px 0;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<br><br>
<button class="primary" onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPage" style="display:none;">

<div class="dashboard">

<h2 style="text-align:center;">📊 Admin Dashboard</h2>

<button class="danger" onclick="logout()">Logout</button>

<!-- ADD PRODUCT -->
<div class="admin-card">

<h3>Add Product</h3>

<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="img" placeholder="Image Path">

<select id="cat">
<option value="bulb">Bulb</option>
<option value="fan">Fan</option>
<option value="light">Light</option>
</select>

<br>
<button class="primary" onclick="addProduct()">Add Product</button>

</div>

<!-- PRODUCT LIST -->
<div class="admin-card">

<h3>All Products</h3>
<div id="list"></div>

</div>

<!-- ORDERS -->
<div class="admin-card">

<h3>All Orders</h3>

<div class="top-bar">
<input id="searchOrder" placeholder="Search by ID / Name / Phone" onkeyup="showOrders()">

<select id="filterStatus" onchange="showOrders()">
<option value="all">All</option>
<option value="Pending">Pending</option>
<option value="Delivered">Delivered</option>
</select>
</div>

<div id="orders"></div>

</div>

</div>

</div>

<script>

/* LOGIN */
function login(){
let u=document.getElementById("user").value.trim();
let p=document.getElementById("pass").value.trim();

if(u==="admin" && p==="1234"){
localStorage.setItem("adminLogin","true");
showAdmin();
}else{
alert("Wrong Username or Password");
}
}

/* AUTO LOGIN */
if(localStorage.getItem("adminLogin")==="true"){
showAdmin();
}

/* SHOW ADMIN */
function showAdmin(){
document.getElementById("loginPage").style.display="none";
document.getElementById("adminPage").style.display="block";
init();
}

/* LOGOUT */
function logout(){
localStorage.removeItem("adminLogin");
location.reload();
}

/* INIT */
function init(){
showProducts();
showOrders();
}

/* ===================== */
/* PRODUCTS */
/* ===================== */

let products = JSON.parse(localStorage.getItem("adminProducts")) || [];

function addProduct(){

let name=document.getElementById("name").value.trim();
let price=document.getElementById("price").value;
let img=document.getElementById("img").value.trim();
let cat=document.getElementById("cat").value;

if(!name || !price || !img){
alert("Fill all fields");
return;
}

/* ✅ FIX: ADD UNIQUE ID */
products.push({
id: Date.now(),
name,
price:Number(price),
img,
cat
});

localStorage.setItem("adminProducts", JSON.stringify(products));

showProducts();

/* CLEAR INPUTS */
document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("img").value="";
}

/* SHOW PRODUCTS */
function showProducts(){
let div=document.getElementById("list");

if(products.length===0){
div.innerHTML="<p>No products added yet</p>";
return;
}

div.innerHTML = products.map((p,i)=>`
<div class="product">
<b>${p.name}</b> - ₹${p.price}
<br><small>Category: ${p.cat}</small>
<br>
<button onclick="deleteProduct(${i})">Delete</button>
</div>
`).join("");
}

/* DELETE */
function deleteProduct(i){
if(confirm("Delete this product?")){
products.splice(i,1);
localStorage.setItem("adminProducts", JSON.stringify(products));
showProducts();
}
}

/* ===================== */
/* ORDERS */
/* ===================== */

let orders = JSON.parse(localStorage.getItem("orders")) || [];

function showOrders(){

let div=document.getElementById("orders");

let search=document.getElementById("searchOrder").value.toLowerCase();
let filter=document.getElementById("filterStatus").value;

let filtered = orders.filter(o=>{

let matchSearch =
o.id.toLowerCase().includes(search) ||
o.name.toLowerCase().includes(search) ||
o.phone.includes(search);

let matchFilter =
filter==="all" || (o.status || "Pending")===filter;

return matchSearch && matchFilter;
});

if(filtered.length===0){
div.innerHTML="<p>No matching orders</p>";
return;
}

div.innerHTML = filtered.map((o,i)=>{

let items = o.items.map(p=>
`${p.name} x${p.qty} = ₹${p.price*p.qty}`
).join("<br>");

return `
<div class="product">

<p><b>Order ID:</b> ${o.id}</p>
<p><b>Date:</b> ${o.date}</p>
<p><b>Name:</b> ${o.name}</p>
<p><b>Phone:</b> ${o.phone}</p>
<p><b>Address:</b> ${o.address}</p>

<p><b>Items:</b><br>${items}</p>

<p><b>Total:</b> ₹${o.total}</p>
<p><b>Payment:</b> ${o.payment}</p>

<p><b>Status:</b> ${o.status || "Pending"}</p>

<button onclick="markDelivered(${i})">Mark Delivered</button>
<button class="danger" onclick="deleteOrder(${i})">Delete</button>

</div>
`;
}).join("");
}

/* STATUS */
function markDelivered(i){
orders[i].status="Delivered";
saveOrders();
}

/* DELETE ORDER */
function deleteOrder(i){
if(confirm("Delete this order?")){
orders.splice(i,1);
saveOrders();
}
}

/* SAVE */
function saveOrders(){
localStorage.setItem("orders", JSON.stringify(orders));
showOrders();
}

</script>

</body>
</html>
