<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f5f5f5;
margin:0;
}

/* LOGIN */
.login-box{
max-width:350px;
margin:80px auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
animation:fadeIn .5s ease;
}

/* DASHBOARD */
.dashboard{
max-width:1100px;
margin:auto;
padding:20px;
animation:fadeIn .5s ease;
}

/* CARDS */
.admin-card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
transition:.3s;
}
.admin-card:hover{
transform:translateY(-3px);
}

/* BUTTON */
button{
padding:8px 15px;
border:none;
background:#111;
color:#fff;
border-radius:6px;
cursor:pointer;
transition:.2s;
}
button:hover{
background:#FFD700;
color:#000;
}
button:active{
transform:scale(0.95);
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

/* PRODUCT ITEM */
.product{
border-bottom:1px solid #eee;
padding:10px 0;
animation:fadeIn .3s ease;
}
.product img{
border-radius:6px;
margin-top:5px;
}

/* POPUP */
.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) scale(0);
background:#111;
color:#fff;
padding:12px 25px;
border-radius:8px;
transition:.3s;
z-index:5000;
}
.popup.show{
transform:translateX(-50%) scale(1);
}

/* SUCCESS ANIMATION */
.success{
background:green !important;
}

/* ANIMATIONS */
@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div id="popup" class="popup"></div>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<br><br>
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPage" style="display:none;">
<div class="dashboard">

<h2 style="text-align:center;">📊 Admin Dashboard</h2>

<p id="productCount"></p>

<button onclick="logout()">Logout</button>

<!-- ADD PRODUCT -->
<div class="admin-card">
<h3>Add Product</h3>

<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="imgFile" type="file" accept="image/*">

<select id="cat">
<option value="bulb">Bulb</option>
<option value="fan">Fan</option>
<option value="light">Light</option>
</select>

<br>
<button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCT LIST -->
<div class="admin-card">
<h3>All Products</h3>
<div id="list"></div>
</div>

</div>
</div>

<script>

/* LOGIN */
const ADMIN_USER="admin";
const ADMIN_PASS="1234";

/* POPUP */
function showPopup(msg,type="normal"){
let p=document.getElementById("popup");
p.innerText=msg;

if(type==="success"){
p.classList.add("success");
}else{
p.classList.remove("success");
}

p.classList.add("show");
setTimeout(()=>p.classList.remove("show"),2000);
}

/* LOGIN */
function login(){
if(user.value===ADMIN_USER && pass.value===ADMIN_PASS){
localStorage.setItem("adminLogin","true");
showAdmin();
}else{
alert("Wrong Username or Password");
}
}

/* AUTO LOGIN */
if(localStorage.getItem("adminLogin")==="true"){
showAdmin();
}

function showAdmin(){
loginPage.style.display="none";
adminPage.style.display="block";
init();
}

function logout(){
localStorage.removeItem("adminLogin");
location.reload();
}

/* INIT */
function init(){
showProducts();
}

/* PRODUCTS */
let products = JSON.parse(localStorage.getItem("adminProducts")) || [];

/* COMPRESS IMAGE */
function compressImage(file,callback){
let reader=new FileReader();

reader.onload=e=>{
let img=new Image();
img.src=e.target.result;

img.onload=()=>{
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=300;
canvas.height=300;

ctx.drawImage(img,0,0,300,300);

callback(canvas.toDataURL("image/jpeg",0.7));
};
};

reader.readAsDataURL(file);
}

/* ADD PRODUCT */
function addProduct(){

let nameVal=name.value.trim();
let priceVal=price.value;
let file=imgFile.files[0];
let catVal=cat.value;

if(!nameVal || !priceVal || !file){
alert("Fill all fields");
return;
}

if(products.find(p=>p.name.toLowerCase()===nameVal.toLowerCase())){
alert("Product already exists");
return;
}

compressImage(file,(imgData)=>{

products.push({
id:"admin-"+Date.now(),
name:nameVal,
price:Number(priceVal),
img:imgData,
cat:catVal
});

localStorage.setItem("adminProducts", JSON.stringify(products));

showProducts();
showPopup("Product Added ✅","success");

/* CLEAR */
name.value="";
price.value="";
imgFile.value="";

});
}

/* SHOW */
function showProducts(){

productCount.innerText="Total Products: "+products.length;

if(products.length===0){
list.innerHTML="<p>No products</p>";
return;
}

list.innerHTML = products.map((p,i)=>`
<div class="product">
<b>${p.name}</b> - ₹${p.price}
<br><small>${p.cat}</small>
<br>
<img src="${p.img}" width="60">
<br>
<button onclick="deleteProduct(${i})">Delete</button>
</div>
`).join("");
}

/* DELETE */
function deleteProduct(i){
if(confirm("Delete this product?")){
products.splice(i,1);
localStorage.setItem("adminProducts", JSON.stringify(products));
showProducts();
showPopup("Deleted ❌");
}
}

</script>

</body>
  </html>
