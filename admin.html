<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* LOGIN BOX */
.login-box{
max-width:350px;
margin:80px auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

/* DASHBOARD */
.dashboard{
max-width:1100px;
margin:auto;
padding:20px;
}

/* CARDS */
.admin-card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

/* TOP BAR */
.top-bar{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:10px 0;
}

/* POPUP */
.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) scale(0);
background:#111;
color:#fff;
padding:10px 20px;
border-radius:8px;
transition:.3s;
z-index:5000;
}
.popup.show{transform:translateX(-50%) scale(1);}

</style>

</head>

<body>

<div id="popup" class="popup"></div>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<br><br>
<button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPage" style="display:none;">

<div class="dashboard">

<h2 style="text-align:center;">📊 Admin Dashboard</h2>

<p id="productCount"></p>

<button onclick="logout()">Logout</button>

<!-- ADD PRODUCT -->
<div class="admin-card">

<h3>Add Product</h3>

<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">

<input id="imgFile" type="file" accept="image/*">

<select id="cat">
<option value="bulb">Bulb</option>
<option value="fan">Fan</option>
<option value="light">Light</option>
</select>

<br>
<button onclick="addProduct()">Add Product</button>

</div>

<!-- PRODUCT LIST -->
<div class="admin-card">

<h3>All Products</h3>
<div id="list"></div>

</div>

<!-- ORDERS -->
<div class="admin-card">

<h3>All Orders</h3>

<div class="top-bar">
<input id="searchOrder" placeholder="Search by ID / Name / Phone" onkeyup="showOrders()">

<select id="filterStatus" onchange="showOrders()">
<option value="all">All</option>
<option value="Pending">Pending</option>
<option value="Delivered">Delivered</option>
</select>
</div>

<div id="orders"></div>

</div>

</div>

</div>

<script>

/* LOGIN CONFIG */
const ADMIN_USER="admin";
const ADMIN_PASS="1234";

/* POPUP */
function showPopup(msg){
let p=document.getElementById("popup");
p.innerText=msg;
p.classList.add("show");
setTimeout(()=>p.classList.remove("show"),2000);
}

/* LOGIN */
function login(){
let u=user.value.trim();
let p=pass.value.trim();

if(u===ADMIN_USER && p===ADMIN_PASS){
localStorage.setItem("adminLogin","true");
showAdmin();
}else{
alert("Wrong Username or Password");
}
}

/* AUTO LOGIN */
if(localStorage.getItem("adminLogin")==="true"){
showAdmin();
}

/* SHOW ADMIN */
function showAdmin(){
loginPage.style.display="none";
adminPage.style.display="block";
init();
}

/* LOGOUT */
function logout(){
localStorage.removeItem("adminLogin");
location.reload();
}

/* INIT */
function init(){
showProducts();
showOrders();
}

/* ===================== */
/* PRODUCTS */
/* ===================== */

let products = JSON.parse(localStorage.getItem("adminProducts")) || [];

/* IMAGE COMPRESS */
function compressImage(file,callback){
let reader=new FileReader();

reader.onload=e=>{
let img=new Image();
img.src=e.target.result;

img.onload=()=>{
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=300;
canvas.height=300;

ctx.drawImage(img,0,0,300,300);

callback(canvas.toDataURL("image/jpeg",0.7));
};
};

reader.readAsDataURL(file);
}

/* ADD PRODUCT */
function addProduct(){

let nameVal=name.value.trim();
let priceVal=price.value;
let file=imgFile.files[0];
let catVal=cat.value;

/* VALIDATION */
if(!nameVal || !priceVal || !file){
alert("Fill all fields");
return;
}

/* DUPLICATE CHECK */
if(products.find(p=>p.name.toLowerCase()===nameVal.toLowerCase())){
alert("Product already exists");
return;
}

/* COMPRESS + SAVE */
compressImage(file,(imgData)=>{

products.push({
id:"admin-"+Date.now(),   // ✅ FIXED ID SYSTEM
name:nameVal,
price:Number(priceVal),
img:imgData,
cat:catVal
});

localStorage.setItem("adminProducts", JSON.stringify(products));

showProducts();
showPopup("Product Added ✅");

/* CLEAR */
name.value="";
price.value="";
imgFile.value="";

});
}

/* SHOW PRODUCTS */
function showProducts(){

productCount.innerText="Total Products: "+products.length;

if(products.length===0){
list.innerHTML="<p>No products added yet</p>";
return;
}

list.innerHTML = products.map((p,i)=>`
<div class="product">
<b>${p.name}</b> - ₹${p.price}
<br><small>${p.cat}</small>
<br>
<img src="${p.img}" width="60">
<br>
<button onclick="deleteProduct(${i})">Delete</button>
</div>
`).join("");
}

/* DELETE */
function deleteProduct(i){
if(confirm("Delete this product?")){
products.splice(i,1);
localStorage.setItem("adminProducts", JSON.stringify(products));
showProducts();
showPopup("Product Deleted ❌");
}
}

/* ===================== */
/* ORDERS */
/* ===================== */

let orders = JSON.parse(localStorage.getItem("orders")) || [];

function showOrders(){

let div=document.getElementById("orders");

let search=searchOrder.value.toLowerCase();
let filter=filterStatus.value;

let filtered = orders.filter(o=>{

let matchSearch =
o.id.toLowerCase().includes(search) ||
o.name.toLowerCase().includes(search) ||
o.phone.includes(search);

let matchFilter =
filter==="all" || (o.status || "Pending")===filter;

return matchSearch && matchFilter;
});

if(filtered.length===0){
div.innerHTML="<p>No matching orders</p>";
return;
}

div.innerHTML = filtered.map((o,i)=>{

let items = o.items.map(p=>
`${p.name} x${p.qty} = ₹${p.price*p.qty}`
).join("<br>");

return `
<div class="product">

<p><b>Order ID:</b> ${o.id}</p>
<p><b>Date:</b> ${o.date}</p>
<p><b>Name:</b> ${o.name}</p>
<p><b>Phone:</b> ${o.phone}</p>
<p><b>Address:</b> ${o.address}</p>

<p><b>Items:</b><br>${items}</p>

<p><b>Total:</b> ₹${o.total}</p>
<p><b>Payment:</b> ${o.payment}</p>

<p><b>Status:</b> 
<span style="color:${(o.status||"Pending")==="Delivered"?"green":"orange"}">
${o.status || "Pending"}
</span>
</p>

<button onclick="markDelivered(${i})">Mark Delivered</button>
<button onclick="deleteOrder(${i})">Delete</button>

</div>
`;
}).join("");
}

/* STATUS */
function markDelivered(i){
orders[i].status="Delivered";
saveOrders();
}

/* DELETE ORDER */
function deleteOrder(i){
if(confirm("Delete this order?")){
orders.splice(i,1);
saveOrders();
showPopup("Order Deleted ❌");
}
}

/* SAVE */
function saveOrders(){
localStorage.setItem("orders", JSON.stringify(orders));
showOrders();
}

</script>

</body>
</html>
