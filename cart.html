<!DOCTYPE html>
<html lang="en">
<head>
<title>Cart - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
color:#fff;
}

/* LOGO */
.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{
to{background-position:200% center;}
}

/* INPUT */
input,textarea{
width:100%;
margin:8px 0;
padding:10px;
}

/* FREE DELIVERY MESSAGE */
#freeMsg{
text-align:center;
font-weight:600;
margin:10px 0;
}

/* SUCCESS */
.success-box{
max-width:400px;
margin:80px auto;
background:#fff;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.1);
animation:pop .5s ease;
}
@keyframes pop{
from{transform:scale(.8);}
to{transform:scale(1);}
}

.success-icon{
font-size:60px;
color:#28a745;
}

button{
padding:10px 15px;
border:none;
background:#111;
color:#fff;
cursor:pointer;
border-radius:5px;
margin:5px;
}
button:hover{
background:#FFD700;
color:#000;
}

/* ✅ FLOATING CART */
.cart-icon{
position:fixed;
bottom:20px;
right:20px;
background:#fb641b;
color:#fff;
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
cursor:pointer;
z-index:1000;
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

</style>

</head>

<body>

<header>
<h2 class="logo">Himanshu Electronics</h2>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</div>
</header>

<div class="container">

<h2 style="text-align:center;">My Cart</h2>

<p id="freeMsg"></p>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr><td>Subtotal</td><td id="subtotal"></td></tr>
<tr><td>Handling</td><td id="handling"></td></tr>
<tr><td>Delivery</td><td id="delivery"></td></tr>
<tr><td><b>Total</b></td><td id="total"></td></tr>
</tfoot>
</table>

<h3>Payment Method</h3>
<label><input type="radio" name="pay" value="COD" checked> Cash on Delivery</label>
<label><input type="radio" name="pay" value="UPI"> UPI</label>

<div id="upiBox" style="display:none;">
<p>UPI ID: <b>paytm.s1ktca0@pty</b></p>
</div>

<h3>Your Details</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Full Address"></textarea>

<p style="color:red;font-size:14px;">
🚚 Delivery available only in Bijnor
</p>

<div style="text-align:center;margin-top:20px;">
<button onclick="clearCart()">Clear Cart</button>
<button onclick="order()">Confirm Order</button>
</div>

</div>

<!-- ✅ FLOATING CART -->
<div class="cart-icon">
🛒 <span id="cartCount" class="cart-count">0</span>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let firstOrder = localStorage.getItem("firstOrderDone");

/* SHOW CART */
function showCart(){

updateCartCount(); // ✅ FIX

if(cart.length===0){
document.getElementById("list").innerHTML =
`<tr><td colspan="5">Cart Empty</td></tr>`;
updateTotals(0);
return;
}

let subtotal = 0;

document.getElementById("list").innerHTML = cart.map((i,index)=>{
let sub = i.price * i.qty;
subtotal += sub;

return `
<tr>
<td>${i.name}</td>
<td>₹${i.price}</td>
<td>
<button onclick="dec(${index})">-</button>
${i.qty}
<button onclick="inc(${index})">+</button>
</td>
<td>₹${sub}</td>
<td><button onclick="removeItem(${index})">❌</button></td>
</tr>
`;
}).join("");

updateTotals(subtotal);
}

/* TOTAL */
function updateTotals(subtotal){

let handling = firstOrder ? 9 : 0;
let delivery = subtotal >= 500 ? 0 : 20;
let total = subtotal + handling + delivery;

let msg = document.getElementById("freeMsg");

if(subtotal === 0){
msg.innerText = "";
}
else if(subtotal >= 500){
msg.innerText = "🎉 Wow! You get FREE delivery";
msg.style.color = "green";
}
else{
let remaining = 500 - subtotal;
msg.innerText = `Add ₹${remaining} more to get FREE delivery`;
msg.style.color = "#0A84FF";
}

document.getElementById("subtotal").innerText = "₹"+subtotal;
document.getElementById("handling").innerText = handling===0?"FREE":"₹"+handling;
document.getElementById("delivery").innerText = delivery===0?"FREE":"₹"+delivery;
document.getElementById("total").innerText = "₹"+total;
}

/* QTY */
function inc(i){cart[i].qty++;save();}
function dec(i){
cart[i].qty--;
if(cart[i].qty<=0) cart.splice(i,1);
save();
}

/* REMOVE */
function removeItem(i){
cart.splice(i,1);
save();
}

/* SAVE */
function save(){
localStorage.setItem("cart", JSON.stringify(cart));
showCart();
}

/* CLEAR */
function clearCart(){
if(confirm("Clear cart?")){
localStorage.removeItem("cart");
cart=[];
showCart();
}
}

/* ORDER */
function order(){

if(cart.length===0){
alert("Cart empty");
return;
}

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;
let pay = document.querySelector('input[name="pay"]:checked').value;

if(!name||!phone||!address){
alert("Fill all details");
return;
}

/* Bijnor check */
let addr = address.toLowerCase();
if(!addr.includes("bijnor")){
alert("❌ Delivery only in Bijnor");
return;
}

let subtotal = cart.reduce((s,i)=>s+(i.price*i.qty),0);
let handling = firstOrder ? 9 : 0;
let delivery = subtotal >= 500 ? 0 : 20;
let total = subtotal + handling + delivery;

let orderID = "HE-" + Date.now();

/* SAVE ORDER */
let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push({
id:orderID,
name,phone,address,
items:cart,
total,
payment:pay,
date:new Date().toLocaleDateString(),
status:"Pending"
});
localStorage.setItem("orders", JSON.stringify(orders));
localStorage.setItem("firstOrderDone","yes");

/* WhatsApp */
let msg = `Order ID: ${orderID}\nTotal: ₹${total}`;
window.open("https://wa.me/919639228237?text="+encodeURIComponent(msg));

localStorage.removeItem("cart");

/* SUCCESS */
document.body.innerHTML = `
<div class="success-box">
<div class="success-icon">✅</div>
<h2>Order Placed</h2>
<p>ID: <b>${orderID}</b></p>
<p>Payment: <b>${pay}</b></p>

<button onclick="location.href='index.html'">Go Home</button>
</div>
`;
}

/* COUNT */
function updateCartCount(){
let total = cart.reduce((s,p)=>s+(p.qty||1),0);
document.getElementById("cartCount").innerText = total;
}

/* UPI */
document.querySelectorAll('input[name="pay"]').forEach(r=>{
r.addEventListener("change",()=>{
document.getElementById("upiBox").style.display =
(r.value==="UPI" && r.checked)?"block":"none";
});
});

/* INIT */
showCart();

</script>

</body>
  </html>
