<!DOCTYPE html>
<html>
<head>
<title>Cart - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

input,textarea{
width:100%;
margin:8px 0;
}

/* PAGE ANIMATION */
body{animation:fadePage .5s ease;}
@keyframes fadePage{from{opacity:0;}to{opacity:1;}}

/* SUCCESS UI */
.success-box{
max-width:400px;
margin:80px auto;
background:#fff;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.1);
animation:pop .5s ease;
}
@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.success-icon{
font-size:60px;
color:#28a745;
animation:bounce .6s;
}
@keyframes bounce{
0%{transform:scale(0);}
60%{transform:scale(1.2);}
100%{transform:scale(1);}
}

/* FREE DELIVERY POPUP */
#freePopup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#0A84FF;
color:#fff;
padding:15px 20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
display:none;
z-index:9999;
animation:slideUp .5s;
}

@keyframes slideUp{
from{transform:translate(-50%,50px);opacity:0;}
to{transform:translate(-50%,0);opacity:1;}
}

/* FREE DELIVERY BAR */
#freeBar{
background:#fff3cd;
padding:12px;
border-radius:10px;
margin-bottom:15px;
font-weight:500;
display:none;
}

</style>

</head>

<body>

<header>
<h2>Himanshu Electronics</h2>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</div>
</header>

<div class="container">

<h2 style="text-align:center;">My Cart</h2>

<div id="freeBar"></div>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price (₹)</th>
<th>Qty</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr>
<td>Subtotal</td>
<td id="subtotal"></td>
<td></td><td></td><td></td>
</tr>

<tr>
<td>Handling Charges</td>
<td id="handling"></td>
<td></td><td></td><td></td>
</tr>

<tr>
<td>Delivery Charges</td>
<td id="delivery"></td>
<td></td><td></td><td></td>
</tr>

<tr>
<td>Total</td>
<td id="total"></td>
<td></td><td></td><td></td>
</tr>
</tfoot>
</table>

<!-- COUPON -->
<h3>Apply Coupon</h3>
<input id="coupon" placeholder="Enter coupon code">
<button onclick="applyCoupon()">Apply</button>
<p id="couponMsg" style="color:green;"></p>

<h3>Payment Method</h3>
<label><input type="radio" name="pay" value="COD" checked> Cash on Delivery</label>
<label><input type="radio" name="pay" value="UPI"> UPI</label>

<div id="upiBox" style="display:none;">
<p>UPI ID: <b id="upiText">paytm.s1ktca0@pty</b></p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=paytm.s1ktca0@pty">
<br>
<button onclick="copyUPI()">Copy UPI</button>
</div>

<h3>Your Details</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Full Address (Only Bijnor delivery available)"></textarea>

<div style="text-align:center;margin-top:20px;">
<button class="danger" onclick="clearCart()">Clear Cart</button>
<button class="primary" onclick="order()">Confirm Order</button>
</div>

</div>

<!-- FREE DELIVERY POPUP -->
<div id="freePopup">
🎉 Wow! You got FREE Delivery on orders above ₹500
</div>

<script>

/* CONFIG */
const handling = 9;
const delivery = 20;

let discount = 0;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* FIRST ORDER */
let isFirstOrder = localStorage.getItem("firstOrderDone") !== "true";
let freeDeliveryShown = false;

const list = document.getElementById("list");

/* SHOW CART */
function showCart(){

if(cart.length===0){
list.innerHTML = `<tr><td colspan="5" style="text-align:center;">Cart is Empty</td></tr>`;
updateTotals(0);
return;
}

let subtotal = 0;

list.innerHTML = cart.map((i,index)=>{
let sub = i.price * i.qty;
subtotal += sub;

return `
<tr>
<td>${i.name}</td>
<td>₹${i.price}</td>
<td>
<button onclick="decreaseQty(${index})">-</button>
${i.qty}
<button onclick="increaseQty(${index})">+</button>
</td>
<td>₹${sub}</td>
<td><button onclick="removeItem(${index})">❌</button></td>
</tr>
`;
}).join("");

updateTotals(subtotal);
}

/* TOTAL */
function updateTotals(subtotal){

let handlingCharge = isFirstOrder ? 0 : handling;
let deliveryCharge = subtotal < 500 ? delivery : 0;

let total = subtotal + handlingCharge + deliveryCharge - discount;

document.getElementById("subtotal").innerText = "₹" + subtotal;
document.getElementById("handling").innerText = handlingCharge===0?"FREE":"₹"+handlingCharge;
document.getElementById("delivery").innerText = deliveryCharge===0?"FREE":"₹"+deliveryCharge;
document.getElementById("total").innerText = "₹" + total;

/* POPUP */
if(subtotal >= 500 && !freeDeliveryShown){
showFreeDeliveryPopup();
freeDeliveryShown = true;
}

/* PROGRESS BAR */
updateFreeBar(subtotal);
}

/* PROGRESS BAR */
function updateFreeBar(subtotal){

let bar = document.getElementById("freeBar");

if(subtotal >= 500){
bar.style.display = "block";
bar.innerHTML = "🎉 You unlocked FREE delivery!";
return;
}

let remaining = 500 - subtotal;

bar.style.display = "block";
bar.innerHTML = `
Add <b>₹${remaining}</b> more to get <b>FREE Delivery</b> 🚚
<div style="background:#ddd;height:6px;border-radius:5px;margin-top:6px;">
<div style="
width:${(subtotal/500)*100}%;
height:6px;
background:#0A84FF;
border-radius:5px;
transition:.3s;
"></div>
</div>
`;
}

/* POPUP */
function showFreeDeliveryPopup(){
let p=document.getElementById("freePopup");
p.style.display="block";
setTimeout(()=>{p.style.display="none";},3000);
}

/* QTY */
function increaseQty(i){cart[i].qty++;save();}
function decreaseQty(i){
cart[i].qty--;
if(cart[i].qty<=0){cart.splice(i,1);}
save();
}

/* REMOVE */
function removeItem(i){cart.splice(i,1);save();}

/* SAVE */
function save(){
localStorage.setItem("cart", JSON.stringify(cart));
showCart();
}

/* CLEAR */
function clearCart(){
if(confirm("Clear entire cart?")){
localStorage.removeItem("cart");
cart=[];
showCart();
}
}

/* COUPON */
function applyCoupon(){
let code=document.getElementById("coupon").value.toUpperCase();

if(code==="SAVE50"){discount=50;}
else if(code==="FIRST100"){discount=100;}
else{discount=0;}

document.getElementById("couponMsg").innerText =
discount>0 ? "Discount Applied!" : "Invalid coupon ❌";

showCart();
}

/* COPY */
function copyUPI(){
navigator.clipboard.writeText(document.getElementById("upiText").innerText);
alert("UPI copied");
}

/* ORDER */
function order(){

if(cart.length===0){alert("Cart is empty");return;}

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let address=document.getElementById("address").value.trim();
let pay=document.querySelector('input[name="pay"]:checked').value;

if(!name||!phone||!address){alert("Fill all details");return;}
if(!address.toLowerCase().includes("bijnor")){
alert("❌ Delivery only in Bijnor");return;
}

let orderItems=[...cart];

let subtotal=orderItems.reduce((s,i)=>s+(i.price*i.qty),0);
let handlingCharge = isFirstOrder ? 0 : handling;
let deliveryCharge = subtotal < 500 ? delivery : 0;

let total = subtotal + handlingCharge + deliveryCharge - discount;

let orderID="HE-"+Date.now();

/* SAVE ORDER */
let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders.push({
id:orderID,name,phone,address,
items:orderItems,total,payment:pay,
date:new Date().toLocaleDateString(),
status:"Pending"
});
localStorage.setItem("orders",JSON.stringify(orders));

/* MARK FIRST ORDER */
localStorage.setItem("firstOrderDone","true");

/* CLEAR CART */
localStorage.removeItem("cart");
cart=[];

/* SUCCESS UI */
document.body.innerHTML=`
<div class="success-box">
<div class="success-icon">✅</div>
<h2>Order Placed Successfully</h2>
<p>Order ID: <b>${orderID}</b></p>
<p>Delivery only in Bijnor</p>
<br>
<a href="index.html"><button class="primary">Go Home</button></a>
</div>
`;
}

/* INIT */
showCart();

</script>

</body>
</html>
