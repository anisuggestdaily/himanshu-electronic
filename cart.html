<!DOCTYPE html>
<html lang="en">
<head>
<title>Cart - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* HEADER */
header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
background:#111;
color:#fff;
}

/* LEFT */
.left{display:flex;align-items:center;gap:10px;}
.menu-btn{font-size:22px;cursor:pointer;}

/* LOGO */
.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{to{background-position:200% center;}}

/* ACTIVE LINK */
.active{color:#FFD700;}

/* CONTAINER */
.container{max-width:1000px;margin:auto;padding:15px;}

/* TABLE */
table{width:100%;border-collapse:collapse;margin-top:20px;background:#fff;}
td,th{border:1px solid #ddd;padding:10px;text-align:center;}

/* INPUT */
input,textarea{width:100%;margin:8px 0;padding:10px;}

/* POPUP */
.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(45deg,#28a745,#5cd65c);
color:#fff;
padding:12px 25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.3);
animation:fadeInOut 3s ease forwards;
z-index:3000;
}
@keyframes fadeInOut{
0%{opacity:0;top:0;}
10%{opacity:1;top:20px;}
90%{opacity:1;}
100%{opacity:0;}
}

/* COUPON */
.coupon-box{
margin:20px 0;
padding:10px;
background:#fff;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

/* BUTTON */
button{
padding:10px 15px;
border:none;
background:#111;
color:#fff;
cursor:pointer;
border-radius:5px;
margin:5px;
}
button:hover{background:#FFD700;color:#000;}

/* FLOATING CART */
.cart-icon{
position:fixed;
bottom:20px;
right:20px;
background:#FFD700;
color:#000;
width:55px;height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
z-index:2000;
}
.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

/* MENU */
.menu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#fff;
padding:20px;
transition:.3s;
z-index:4000;
box-shadow:5px 0 20px rgba(0,0,0,.2);
}
.menu.open{left:0;}
.menu a{
display:block;
margin:15px 0;
text-decoration:none;
color:#111;
font-weight:500;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
z-index:3000;
}
.overlay.show{display:block;}

</style>
</head>

<body>

<header>
<div class="left">
<span class="menu-btn" onclick="toggleMenu()">⋮</span>
<h2 class="logo">Himanshu Electronics</h2>
</div>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="cart.html" class="active">Cart</a>
</div>
</header>

<!-- MENU -->
<div class="menu" id="menu">
<a href="order-history.html">📦 Order History</a>
<a onclick="toggleMode()">🌙 Toggle Mode</a>
<a href="contact.html">📞 Contact</a>
<a onclick="about()">ℹ About Us</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="container">

<h2 style="text-align:center;">My Cart</h2>
<p id="freeText" style="text-align:center;font-weight:600;"></p>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr><td>Subtotal</td><td id="subtotal"></td></tr>
<tr><td>Handling</td><td id="handling"></td></tr>
<tr><td>Delivery</td><td id="delivery"></td></tr>
<tr><td>Discount</td><td id="discount">₹0</td></tr>
<tr><td><b>Total</b></td><td id="total"></td></tr>
</tfoot>
</table>

<div class="coupon-box">
<h3>Apply Coupon</h3>
<input id="coupon" placeholder="Enter coupon code">
<button onclick="applyCoupon()">Apply</button>
<p id="couponMsg"></p>
</div>

<h3>Payment Method</h3>
<label><input type="radio" name="pay" value="COD" checked> COD</label>
<label><input type="radio" name="pay" value="UPI"> UPI</label>

<h3>Your Details</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Full Address (Delivery available only in Bijnor)"></textarea>

<div style="text-align:center;">
<button onclick="clearCart()">Clear Cart</button>
<button onclick="order()">Confirm Order</button>
</div>

</div>

<div class="cart-icon" onclick="location.href='product.html'">
🛒 <span id="cartCount" class="cart-count">0</span>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let discount = 0;
let popupShown = false;

/* MENU */
function toggleMenu(){
menu.classList.toggle("open");
overlay.classList.toggle("show");
}

/* MODE */
function toggleMode(){
document.body.classList.toggle("dark");
}

/* ABOUT */
function about(){
alert("Himanshu Electronics - Trusted electrical shop in Bijnor");
}

/* CART */
function showCart(){

updateCartCount();

if(cart.length===0){
list.innerHTML=`<tr><td colspan="5">Cart Empty</td></tr>`;
updateTotals(0);
return;
}

let subtotal = 0;

list.innerHTML = cart.map((i,index)=>{
let sub = i.price * i.qty;
subtotal += sub;

return `
<tr>
<td>${i.name}</td>
<td>₹${i.price}</td>
<td>
<button onclick="dec(${index})">-</button>
${i.qty}
<button onclick="inc(${index})">+</button>
</td>
<td>₹${sub}</td>
<td><button onclick="removeItem(${index})">❌</button></td>
</tr>
`;
}).join("");

updateTotals(subtotal);
}

function updateTotals(subtotal){

let delivery = subtotal >= 500 ? 0 : 20;
let total = subtotal + delivery - discount;

/* TEXT */
if(subtotal>=500){
freeText.innerText="🎉 Wow! You got FREE delivery";
deliveryEl.innerText="FREE (Wow! You got FREE Delivery)";
}else{
let remain = 500 - subtotal;
freeText.innerText=`Add ₹${remain} more to get FREE delivery`;
deliveryEl.innerText="₹20";
}

/* POPUP */
if(subtotal>=500 && !popupShown){
popupShown=true;
let p=document.createElement("div");
p.className="popup";
p.innerText="🎉 Wow! You got FREE Delivery";
document.body.appendChild(p);
setTimeout(()=>p.remove(),3000);
}

subtotalEl.innerText="₹"+subtotal;
handlingEl.innerText="FREE";
discountEl.innerText="₹"+discount;
totalEl.innerText="₹"+total;
}

/* COUPON */
function applyCoupon(){
let code=coupon.value.toUpperCase();
let subtotal=cart.reduce((s,i)=>s+(i.price*i.qty),0);

if(code==="SAVE50" && subtotal>=1000){discount=50;couponMsg.innerText="₹50 applied";}
else if(code==="FIRST100" && subtotal>=1500){discount=100;couponMsg.innerText="₹100 applied";}
else{discount=0;couponMsg.innerText="Invalid";}
showCart();
}

/* ORDER */
function order(){

if(cart.length===0){alert("Cart empty");return;}

let nameVal=name.value;
let phoneVal=phone.value;
let addressVal=address.value;
let pay=document.querySelector('input[name="pay"]:checked').value;

if(!nameVal||!phoneVal||!addressVal){
alert("Fill all details");return;
}

if(!addressVal.toLowerCase().includes("bijnor")){
alert("Delivery only in Bijnor");return;
}

let subtotal = cart.reduce((s,i)=>s+(i.price*i.qty),0);
let delivery = subtotal >= 500 ? 0 : 20;
let total = subtotal + delivery - discount;
let orderID="HE-"+Date.now();

let items=cart.map(p=>`${p.name} x${p.qty} = ₹${p.price*p.qty}`).join("\n");

/* WHATSAPP MESSAGE */
let msg=
`Order ID: ${orderID}

Products:
${items}

Subtotal: ₹${subtotal}
Discount: ₹${discount}
Total: ₹${total}

Customer:
Name: ${nameVal}
Phone: ${phoneVal}
Address: ${addressVal}`;

window.open("https://wa.me/919639228237?text="+encodeURIComponent(msg));

/* SAVE ORDER */
let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders.push({
id:orderID,
items:cart,
total,
payment:pay,
date:new Date().toLocaleDateString(),
name:nameVal,
phone:phoneVal
});
localStorage.setItem("orders",JSON.stringify(orders));

localStorage.removeItem("cart");

/* SUCCESS */
document.body.innerHTML=`
<div class="container" style="text-align:center;margin-top:50px;">
<h2>✅ Order Placed</h2>
<p><b>Order ID:</b> ${orderID}</p>
<p><b>Payment:</b> ${pay}</p>
<p><b>Products:</b><br>${items}</p>
<button onclick="location.href='index.html'">Go Home</button>
<button onclick="location.href='order-history.html'">View Orders</button>
</div>`;
}

/* UTILS */
function inc(i){cart[i].qty++;save();}
function dec(i){cart[i].qty--;if(cart[i].qty<=0)cart.splice(i,1);save();}
function removeItem(i){cart.splice(i,1);save();}
function save(){localStorage.setItem("cart",JSON.stringify(cart));showCart();}
function clearCart(){localStorage.removeItem("cart");cart=[];showCart();}
function updateCartCount(){cartCount.innerText=cart.reduce((s,p)=>s+(p.qty||1),0);}

/* DOM */
let list=document.getElementById("list");
let subtotalEl=document.getElementById("subtotal");
let handlingEl=document.getElementById("handling");
let deliveryEl=document.getElementById("delivery");
let discountEl=document.getElementById("discount");
let totalEl=document.getElementById("total");
let freeText=document.getElementById("freeText");
let coupon=document.getElementById("coupon");
let couponMsg=document.getElementById("couponMsg");
let name=document.getElementById("name");
let phone=document.getElementById("phone");
let address=document.getElementById("address");

/* INIT */
showCart();

</script>

</body>
</html>
