<!DOCTYPE html>
<html lang="en">
<head>
<title>Cart - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{font-family:Poppins;}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
color:#fff;
}

.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{
to{background-position:200% center;}
}

input,textarea{
width:100%;
margin:8px 0;
padding:10px;
}

button{
padding:10px 15px;
border:none;
background:#111;
color:#fff;
cursor:pointer;
border-radius:5px;
margin:5px;
}

/* FLOATING CART (MATCHED) */
.floating-cart{
position:fixed;
bottom:20px;
right:20px;
background:#FFD700;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
z-index:1000;
}

/* POPUP */
#popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) scale(0);
background:#28a745;
color:#fff;
padding:12px 20px;
border-radius:8px;
transition:.4s;
z-index:5000;
}

</style>
</head>

<body>

<header>
<h2 class="logo">Himanshu Electronics</h2>
<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</div>
</header>

<h2 style="text-align:center;">My Cart</h2>

<p id="freeMsg"></p>

<!-- COUPON -->
<div style="text-align:center;">
<input id="coupon" placeholder="Enter Coupon">
<button onclick="applyCoupon()">Apply</button>
<p id="couponMsg"></p>
</div>

<!-- POPUP -->
<div id="popup">🎉 Free Delivery Unlocked!</div>

<table border="1" width="100%">
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr><td>Subtotal</td><td id="subtotal"></td></tr>
<tr><td>Discount</td><td id="discountRow">₹0</td></tr>
<tr><td>Delivery</td><td id="delivery"></td></tr>
<tr><td><b>Total</b></td><td id="total"></td></tr>
</tfoot>
</table>

<h3>Payment</h3>
<label><input type="radio" name="pay" value="COD" checked> COD</label>
<label><input type="radio" name="pay" value="UPI"> UPI</label>

<div id="upiBox" style="display:none;">
UPI: paytm.s1ktca0@pty
</div>

<h3>Your Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<div style="text-align:center;">
<button onclick="clearCart()">Clear Cart</button>
<button onclick="order()">Confirm Order</button>
</div>

<!-- FLOATING CART -->
<div class="floating-cart" onclick="location.href='product.html'">🛒</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let discount = 0;
let couponUsed = false;
let popupShown = false;

/* SHOW */
function showCart(){

if(cart.length===0){
list.innerHTML=`<tr><td colspan="5">Cart Empty</td></tr>`;
updateTotals(0);
return;
}

let subtotal=0;

list.innerHTML = cart.map((i,idx)=>{
let qty=i.qty||1;
let sub=i.price*qty;
subtotal+=sub;

return `<tr>
<td>${i.name}</td>
<td>₹${i.price}</td>
<td>
<button onclick="dec(${idx})">-</button>
${qty}
<button onclick="inc(${idx})">+</button>
</td>
<td>₹${sub}</td>
<td><button onclick="removeItem(${idx})">❌</button></td>
</tr>`;
}).join("");

updateTotals(subtotal);
}

/* TOTAL */
function updateTotals(subtotal){

let delivery = subtotal>=500?0:20;

/* POPUP ONCE */
if(subtotal>=500 && !popupShown){
popupShown=true;
let p=document.getElementById("popup");
p.style.transform="translateX(-50%) scale(1)";
setTimeout(()=>p.style.transform="translateX(-50%) scale(0)",2000);
}

let total = subtotal + delivery - discount;
total = Math.max(0,total);

subtotalEl.innerText="₹"+subtotal;
discountRow.innerText="-₹"+discount;
deliveryEl.innerText=delivery===0?"FREE":"₹"+delivery;
totalEl.innerText="₹"+total;
}

/* COUPON */
function applyCoupon(){

if(couponUsed) return;

let code=coupon.value.toUpperCase();
let subtotal=cart.reduce((s,i)=>s+(i.price*(i.qty||1)),0);

if(code==="SAVE50" && subtotal>=1000){
discount=50;
couponMsg.innerText="Applied SAVE50";
couponUsed=true;
}
else if(code==="FIRST100" && subtotal>=1500){
discount=100;
couponMsg.innerText="Applied FIRST100";
couponUsed=true;
}
else{
couponMsg.innerText="Invalid coupon";
}

updateTotals(subtotal);
}

/* QTY */
function inc(i){cart[i].qty=(cart[i].qty||1)+1;save();}
function dec(i){
cart[i].qty--;
if(cart[i].qty<=0) cart.splice(i,1);
save();
}

/* REMOVE */
function removeItem(i){cart.splice(i,1);save();}

/* SAVE */
function save(){
localStorage.setItem("cart",JSON.stringify(cart));
showCart();
}

/* ORDER */
function order(){

let phone=document.getElementById("phone").value;

if(!/^[0-9]{10}$/.test(phone)){
alert("Enter valid 10-digit phone");
return;
}

let subtotal=cart.reduce((s,i)=>s+(i.price*(i.qty||1)),0);
let delivery=subtotal>=500?0:20;
let total=Math.max(0,subtotal+delivery-discount);

let items=cart.map(i=>`${i.name} x${i.qty}`).join(", ");

let msg=`Order\nItems: ${items}\nTotal: ₹${total}`;
window.open("https://wa.me/919639228237?text="+encodeURIComponent(msg));

localStorage.removeItem("cart");

document.body.innerHTML=`<h2 style="text-align:center;">✅ Order Placed</h2>`;
}

/* INIT */
showCart();

</script>

</body>
                                              </html>
