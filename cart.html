<!DOCTYPE html>
<html>
<head>
<title>Cart - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

/* LAYOUT */
.checkout{
display:flex;
flex-wrap:wrap;
gap:20px;
}

/* LEFT */
.cart-left{
flex:2;
}

/* RIGHT */
.cart-right{
flex:1;
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
height:fit-content;
}

/* SECTION */
.section{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<header>
<h2 style="font-weight:600;">Himanshu Electronics</h2>
<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</div>
</header>

<div class="container">

<h2 style="text-align:center;">🛒 Your Cart</h2>

<div class="checkout">

<!-- LEFT -->
<div class="cart-left">

<div class="section">

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

</div>

<!-- COUPON -->
<div class="section">
<h3>Apply Coupon</h3>
<input id="coupon" placeholder="Enter coupon code">
<button class="primary" onclick="applyCoupon()">Apply</button>
<p id="couponMsg" style="color:green;"></p>
</div>

<!-- DETAILS -->
<div class="section">
<h3>Your Details</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Full Address (Only Bijnor delivery available)"></textarea>
</div>

<!-- PAYMENT -->
<div class="section">
<h3>Payment Method</h3>

<label><input type="radio" name="pay" value="COD" checked> Cash on Delivery</label><br>
<label><input type="radio" name="pay" value="UPI"> UPI</label>

<div id="upiBox" style="display:none;margin-top:10px;">
<p>UPI ID: <b id="upiText">paytm.s1ktca0@pty</b></p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=paytm.s1ktca0@pty">
<br>
<button onclick="copyUPI()">Copy UPI</button>
</div>

</div>

</div>

<!-- RIGHT (SUMMARY) -->
<div class="cart-right">

<h3>Price Details</h3>

<p>Subtotal: <span id="subtotal"></span></p>
<p>Handling: <span id="handling"></span></p>
<p><b>Total: <span id="total"></span></b></p>

<br>

<button class="primary" style="width:100%;" onclick="order()">Place Order</button>

<br><br>

<button class="danger" style="width:100%;" onclick="clearCart()">Clear Cart</button>

</div>

</div>

</div>

<script>

/* DATA */
const handling = 9;
let discount = 0;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ELEMENT */
const list = document.getElementById("list");

/* SHOW CART */
function showCart(){
let subtotal = 0;

list.innerHTML = cart.map((i,index)=>{
let sub = i.price * i.qty;
subtotal += sub;

return `
<tr>
<td>${i.name}</td>
<td>₹${i.price}</td>
<td>
<button onclick="decreaseQty(${index})">-</button>
${i.qty}
<button onclick="increaseQty(${index})">+</button>
</td>
<td>₹${sub}</td>
<td><button onclick="removeItem(${index})">❌</button></td>
</tr>
`;
}).join("");

let handlingCharge = subtotal >= 500 ? 0 : handling;
let total = subtotal + handlingCharge - discount;

document.getElementById("subtotal").innerText = "₹" + subtotal;
document.getElementById("handling").innerText = handlingCharge===0?"FREE":"₹"+handlingCharge;
document.getElementById("total").innerText = "₹" + total;
}

/* QTY */
function increaseQty(i){cart[i].qty++;save();}
function decreaseQty(i){
cart[i].qty--;
if(cart[i].qty<=0){cart.splice(i,1);}
save();
}

/* REMOVE */
function removeItem(i){
cart.splice(i,1);
save();
}

/* SAVE */
function save(){
localStorage.setItem("cart", JSON.stringify(cart));
showCart();
}

/* CLEAR */
function clearCart(){
localStorage.removeItem("cart");
cart=[];
showCart();
}

/* COUPON */
function applyCoupon(){
let code = document.getElementById("coupon").value.toUpperCase();

if(code==="SAVE50"){
discount=50;
document.getElementById("couponMsg").innerText="₹50 discount applied!";
}
else if(code==="FIRST100"){
discount=100;
document.getElementById("couponMsg").innerText="₹100 discount applied!";
}
else{
discount=0;
document.getElementById("couponMsg").innerText="Invalid coupon ❌";
}

showCart();
}

/* COPY UPI */
function copyUPI(){
navigator.clipboard.writeText(document.getElementById("upiText").innerText);
alert("UPI copied");
}

/* ORDER ID */
function generateOrderID(){
let d = new Date();
let y = d.getFullYear();
let m = String(d.getMonth()+1).padStart(2,'0');
let da = String(d.getDate()).padStart(2,'0');
let rand = Math.floor(1000 + Math.random()*9000);
return `HE-${y}${m}${da}-${rand}`;
}

/* SAVE ORDER */
function saveOrder(data){
let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push(data);
localStorage.setItem("orders", JSON.stringify(orders));
}

/* ORDER */
function order(){

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let address = document.getElementById("address").value.trim();
let pay = document.querySelector('input[name="pay"]:checked').value;

if(!name || !phone || !address){
alert("Please fill all details");
return;
}

if(!address.toLowerCase().includes("bijnor")){
alert("❌ Delivery available only in Bijnor");
return;
}

let subtotal = cart.reduce((s,i)=>s+(i.price*i.qty),0);
let handlingCharge = subtotal>=500?0:handling;
let total = subtotal + handlingCharge - discount;

let orderID = generateOrderID();

let orderData = {
id: orderID,
name: name,
phone: phone,
address: address,
items: cart,
total: total,
payment: pay,
date: new Date().toLocaleDateString()
};

saveOrder(orderData);

localStorage.removeItem("cart");
cart=[];

/* WHATSAPP */
let msg = "🧾 Order ID: "+orderID+"%0A%0AOrder Details:%0A";

orderData.items.forEach(i=>{
msg += i.name+" x"+i.qty+" = ₹"+(i.price*i.qty)+"%0A";
});

msg += "Total: ₹"+total+"%0A";
msg += "Payment: "+pay+"%0A";
msg += "Name: "+name+"%0A";
msg += "Phone: "+phone+"%0A";
msg += "Address: "+address;

window.open("https://wa.me/919639228237?text="+msg);

/* SUCCESS */
document.body.innerHTML = `
<div class="success">
<h2>✅ Order Placed</h2>
<p>Order ID: <b>${orderID}</b></p>
<p>Delivery only in Bijnor</p>
<a href="index.html">Go Home</a>
</div>
`;
}

/* PAYMENT TOGGLE */
document.querySelectorAll('input[name="pay"]').forEach(r=>{
r.addEventListener("change",()=>{
document.getElementById("upiBox").style.display =
(r.value==="UPI" && r.checked)?"block":"none";
});
});

/* INIT */
showCart();

</script>

</body>
  </html>
