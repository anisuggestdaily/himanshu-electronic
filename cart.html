<!DOCTYPE html>
<html>
<head>
<title>Cart - Himanshu Electronics</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h2>Himanshu Electronics</h2>
<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</div>
</header>

<div class="container">

<h2 style="text-align:center;">My Cart</h2>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price (₹)</th>
<th>Qty</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr>
<td>Subtotal</td>
<td id="subtotal"></td>
<td></td>
<td></td>
<td></td>
</tr>

<tr>
<td>Handling Charges</td>
<td id="handling"></td>
<td></td>
<td></td>
<td></td>
</tr>

<tr class="total-row">
<td>Total</td>
<td id="total"></td>
<td></td>
<td></td>
<td></td>
</tr>
</tfoot>
</table>

<!-- ✅ COUPON -->
<h3>Apply Coupon</h3>
<input id="coupon" placeholder="Enter coupon code">
<button onclick="applyCoupon()">Apply</button>
<p id="couponMsg" style="color:green;"></p>

<h3>Payment Method</h3>
<label><input type="radio" name="pay" value="COD" checked> Cash on Delivery</label>
<label><input type="radio" name="pay" value="UPI"> UPI</label>

<div id="upiBox">
<p>UPI ID: <b id="upiText">paytm.s1ktca0@pty</b></p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=paytm.s1ktca0@pty">
<br>
<button onclick="copyUPI()">Copy UPI</button>
</div>

<h3>Your Details</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<div style="text-align:center;margin-top:20px;">
<button class="danger" onclick="clearCart()">Clear Cart</button>
<button class="primary" onclick="order()">Confirm Order</button>
</div>

</div>

<script>

/* DATA */
const handling = 9;
let discount = 0;
let appliedCoupon = "";

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ELEMENT */
const list = document.getElementById("list");

/* SHOW CART */
function showCart(){
let subtotal = 0;

list.innerHTML = cart.map((i,index)=>{
let sub = i.price * i.qty;
subtotal += sub;

return `
<tr>
<td>${i.name}</td>
<td>₹${i.price}</td>

<td>
<button onclick="decreaseQty(${index})">-</button>
${i.qty}
<button onclick="increaseQty(${index})">+</button>
</td>

<td>₹${sub}</td>

<td><button onclick="removeItem(${index})">❌</button></td>
</tr>
`;
}).join("");

/* FREE DELIVERY */
let handlingCharge = subtotal >= 500 ? 0 : handling;

/* FINAL TOTAL */
let total = subtotal + handlingCharge - discount;

document.getElementById("subtotal").innerText = "₹" + subtotal;
document.getElementById("handling").innerText = handlingCharge === 0 ? "FREE" : "₹" + handlingCharge;
document.getElementById("total").innerText = "₹" + total;
}

/* QTY */
function increaseQty(i){cart[i].qty++;save();}
function decreaseQty(i){
cart[i].qty--;
if(cart[i].qty<=0){cart.splice(i,1);}
save();
}

/* REMOVE */
function removeItem(i){
cart.splice(i,1);
save();
}

/* SAVE */
function save(){
localStorage.setItem("cart", JSON.stringify(cart));
showCart();
}

/* CLEAR */
function clearCart(){
localStorage.removeItem("cart");
cart = [];
showCart();
}

/* COUPON */
function applyCoupon(){
let code = document.getElementById("coupon").value.toUpperCase();

if(code === "SAVE50"){
discount = 50;
appliedCoupon = code;
document.getElementById("couponMsg").innerText = "₹50 discount applied!";
}
else if(code === "FIRST100"){
discount = 100;
appliedCoupon = code;
document.getElementById("couponMsg").innerText = "₹100 discount applied!";
}
else{
discount = 0;
appliedCoupon = "";
document.getElementById("couponMsg").innerText = "Invalid coupon ❌";
}

showCart();
}

/* COPY UPI */
function copyUPI(){
navigator.clipboard.writeText(document.getElementById("upiText").innerText);
alert("UPI copied");
}

/* ORDER */
function order(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let pay = document.querySelector('input[name="pay"]:checked').value;

if(!name || !phone){
alert("Fill details");
return;
}

let subtotal = cart.reduce((s,i)=>s+(i.price*i.qty),0);
let handlingCharge = subtotal >= 500 ? 0 : handling;
let total = subtotal + handlingCharge - discount;

/* WHATSAPP */
let msg = "Order Details:%0A";

cart.forEach(i=>{
msg += i.name + " x"+i.qty+" = ₹" + (i.price*i.qty) + "%0A";
});

msg += "Handling: "+(handlingCharge===0?"FREE":"₹"+handlingCharge)+"%0A";
msg += "Discount: ₹"+discount+"%0A";
msg += "Total: ₹"+total+"%0A";
msg += "Payment: "+pay+"%0A";
msg += "Name: "+name+"%0A";
msg += "Phone: "+phone;

window.open("https://wa.me/919639228237?text=" + msg);

document.body.innerHTML = `
<div class="success">
<h2>✅ Order Placed</h2>
<p>We will contact you soon</p>
<a href="index.html">Go Home</a>
</div>
`;
}

/* PAYMENT TOGGLE */
document.querySelectorAll('input[name="pay"]').forEach(r=>{
r.addEventListener("change",()=>{
document.getElementById("upiBox").style.display =
(r.value==="UPI" && r.checked) ? "block":"none";
});
});

/* INIT */
showCart();

</script>

</body>
  </html>
