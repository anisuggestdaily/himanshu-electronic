<!DOCTYPE html>
<html>
<head>
<title>Cart - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

input,textarea{
width:100%;
margin:8px 0;
}

/* SUCCESS UI */
.success-box{
max-width:400px;
margin:80px auto;
background:#fff;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.1);
animation:pop .5s ease;
}
@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.success-icon{
font-size:60px;
color:#28a745;
}

</style>

</head>

<body>

<header>
<h2>Himanshu Electronics</h2>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</div>
</header>

<div class="container">

<h2 style="text-align:center;">My Cart</h2>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr><td>Subtotal</td><td id="subtotal"></td></tr>
<tr><td>Handling</td><td id="handling"></td></tr>
<tr><td>Delivery</td><td id="delivery"></td></tr>
<tr><td><b>Total</b></td><td id="total"></td></tr>
</tfoot>
</table>

<h3>Your Details</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Full Address"></textarea>

<div style="text-align:center;margin-top:20px;">
<button class="danger" onclick="clearCart()">Clear Cart</button>
<button class="primary" onclick="order()">Confirm Order</button>
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* FIRST ORDER CHECK */
let firstOrder = localStorage.getItem("firstOrderDone");

/* SHOW CART */
function showCart(){

if(cart.length===0){
document.getElementById("list").innerHTML = `<tr><td colspan="5">Cart Empty</td></tr>`;
updateTotals(0);
return;
}

let subtotal = 0;

document.getElementById("list").innerHTML = cart.map((i,index)=>{
let sub = i.price * i.qty;
subtotal += sub;

return `
<tr>
<td>${i.name}</td>
<td>₹${i.price}</td>
<td>
<button onclick="dec(${index})">-</button>
${i.qty}
<button onclick="inc(${index})">+</button>
</td>
<td>₹${sub}</td>
<td><button onclick="removeItem(${index})">❌</button></td>
</tr>
`;
}).join("");

updateTotals(subtotal);
}

/* TOTAL */
function updateTotals(subtotal){

let handling = firstOrder ? 9 : 0;
let delivery = subtotal >= 500 ? 0 : 20;

if(subtotal>=500){
alert("🎉 Wow! You get FREE Delivery!");
}

let total = subtotal + handling + delivery;

document.getElementById("subtotal").innerText = "₹"+subtotal;
document.getElementById("handling").innerText = handling===0?"FREE":"₹"+handling;
document.getElementById("delivery").innerText = delivery===0?"FREE":"₹"+delivery;
document.getElementById("total").innerText = "₹"+total;
}

/* QTY */
function inc(i){cart[i].qty++;save();}
function dec(i){cart[i].qty--; if(cart[i].qty<=0) cart.splice(i,1); save();}

/* REMOVE */
function removeItem(i){cart.splice(i,1);save();}

/* SAVE */
function save(){
localStorage.setItem("cart", JSON.stringify(cart));
showCart();
}

/* CLEAR */
function clearCart(){
localStorage.removeItem("cart");
cart=[];
showCart();
}

/* ORDER */
function order(){

if(cart.length===0){alert("Cart empty");return;}

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;

if(!name||!phone||!address){
alert("Fill all details");
return;
}

let orderItems = [...cart];

let subtotal = orderItems.reduce((s,i)=>s+(i.price*i.qty),0);
let handling = firstOrder ? 9 : 0;
let delivery = subtotal >= 500 ? 0 : 20;
let total = subtotal + handling + delivery;

let orderID = "HE-" + Date.now();

/* SAVE ORDER */
let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push({
id:orderID,
name,phone,address,
items:orderItems,
total,
date:new Date().toLocaleDateString(),
status:"Pending"
});
localStorage.setItem("orders", JSON.stringify(orders));

/* MARK FIRST ORDER */
localStorage.setItem("firstOrderDone","yes");

/* WHATSAPP MESSAGE */
let msg = `🧾 New Order\n\n`;
msg += `Order ID: ${orderID}\n\n`;

orderItems.forEach(i=>{
msg += `${i.name} x${i.qty} = ₹${i.price*i.qty}\n`;
});

msg += `\nTotal: ₹${total}`;
msg += `\nName: ${name}`;
msg += `\nPhone: ${phone}`;
msg += `\nAddress: ${address}`;

let url = "https://wa.me/919639228237?text=" + encodeURIComponent(msg);

/* OPEN WHATSAPP */
window.open(url, "_blank");

/* CLEAR CART */
localStorage.removeItem("cart");
cart=[];

/* SUCCESS UI */
document.body.innerHTML = `
<div class="success-box">
<div class="success-icon">✅</div>
<h2>Order Placed</h2>
<p>ID: <b>${orderID}</b></p>
<a href="index.html"><button class="primary">Go Home</button></a>
</div>
`;
}

/* INIT */
showCart();

</script>

</body>
</html>
