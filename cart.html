<!DOCTYPE html>
<html>
<head>
<title>Cart - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

input,textarea{
width:100%;
margin:8px 0;
}

/* PAGE ANIMATION */
body{animation:fadePage .5s ease;}
@keyframes fadePage{from{opacity:0;}to{opacity:1;}}

/* SUCCESS UI */
.success-box{
max-width:400px;
margin:80px auto;
background:#fff;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.1);
animation:pop .5s ease;
}
@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.success-icon{
font-size:60px;
color:#28a745;
animation:bounce .6s;
}
@keyframes bounce{
0%{transform:scale(0);}
60%{transform:scale(1.2);}
100%{transform:scale(1);}
}

</style>

</head>

<body>

<header>
<h2>Himanshu Electronics</h2>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</div>
</header>

<div class="container">

<h2 style="text-align:center;">My Cart</h2>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price (₹)</th>
<th>Qty</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr>
<td>Subtotal</td>
<td id="subtotal"></td>
<td></td><td></td><td></td>
</tr>

<tr>
<td>Handling Charges</td>
<td id="handling"></td>
<td></td><td></td><td></td>
</tr>

<tr>
<td>Delivery Charges</td>
<td id="delivery"></td>
<td></td><td></td><td></td>
</tr>

<tr>
<td>Total</td>
<td id="total"></td>
<td></td><td></td><td></td>
</tr>
</tfoot>
</table>

<h3>Apply Coupon</h3>
<input id="coupon" placeholder="Enter coupon code">
<button onclick="applyCoupon()">Apply</button>
<p id="couponMsg" style="color:green;"></p>

<h3>Payment Method</h3>
<label><input type="radio" name="pay" value="COD" checked> Cash on Delivery</label>
<label><input type="radio" name="pay" value="UPI"> UPI</label>

<div id="upiBox" style="display:none;">
<p>UPI ID: <b id="upiText">paytm.s1ktca0@pty</b></p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=paytm.s1ktca0@pty">
<br>
<button onclick="copyUPI()">Copy UPI</button>
</div>

<h3>Your Details</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Full Address (Only Bijnor delivery available)"></textarea>

<div style="text-align:center;margin-top:20px;">
<button class="danger" onclick="clearCart()">Clear Cart</button>
<button class="primary" onclick="order()">Confirm Order</button>
</div>

</div>

<script>

const handling = 9;
const deliveryCharge = 20;

let discount = 0;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const list = document.getElementById("list");

function showCart(){

if(cart.length===0){
list.innerHTML = `<tr><td colspan="5" style="text-align:center;">Cart is Empty</td></tr>`;
updateTotals(0);
return;
}

let subtotal = 0;

list.innerHTML = cart.map((i,index)=>{
let sub = i.price * i.qty;
subtotal += sub;

return `
<tr>
<td>${i.name}</td>
<td>₹${i.price}</td>

<td>
<button onclick="decreaseQty(${index})">-</button>
${i.qty}
<button onclick="increaseQty(${index})">+</button>
</td>

<td>₹${sub}</td>

<td><button onclick="removeItem(${index})">❌</button></td>
</tr>
`;
}).join("");

updateTotals(subtotal);
}

function updateTotals(subtotal){

let orderCount = Number(localStorage.getItem("orderCount") || 0);

/* HANDLING */
let handlingCharge = orderCount === 0 ? 0 : handling;

/* DELIVERY */
let delivery = subtotal >= 500 ? 0 : deliveryCharge;

/* POPUP */
if(subtotal >= 500 && !localStorage.getItem("freeDeliveryShown")){
alert("🎉 Wow! You get FREE delivery on orders above ₹500");
localStorage.setItem("freeDeliveryShown","yes");
}

let total = subtotal + handlingCharge + delivery - discount;

document.getElementById("subtotal").innerText = "₹" + subtotal;
document.getElementById("handling").innerText = handlingCharge===0?"FREE":"₹"+handlingCharge;
document.getElementById("delivery").innerText = delivery===0?"FREE":"₹"+delivery;
document.getElementById("total").innerText = "₹" + total;
}

function increaseQty(i){cart[i].qty++;save();}
function decreaseQty(i){
cart[i].qty--;
if(cart[i].qty<=0){cart.splice(i,1);}
save();
}

function removeItem(i){
cart.splice(i,1);
save();
}

function save(){
localStorage.setItem("cart", JSON.stringify(cart));
showCart();
}

function clearCart(){
if(confirm("Clear entire cart?")){
localStorage.removeItem("cart");
cart=[];
showCart();
}
}

function applyCoupon(){
let code = document.getElementById("coupon").value.toUpperCase();

if(code==="SAVE50"){
discount=50;
document.getElementById("couponMsg").innerText="₹50 discount applied!";
}
else if(code==="FIRST100"){
discount=100;
document.getElementById("couponMsg").innerText="₹100 discount applied!";
}
else{
discount=0;
document.getElementById("couponMsg").innerText="Invalid coupon ❌";
}

showCart();
}

function copyUPI(){
navigator.clipboard.writeText(document.getElementById("upiText").innerText);
alert("UPI copied");
}

function generateOrderID(){
let d = new Date();
return "HE-" + d.getFullYear() + (d.getMonth()+1) + d.getDate() + "-" + Math.floor(1000 + Math.random()*9000);
}

function saveOrder(data){
let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push(data);
localStorage.setItem("orders", JSON.stringify(orders));
}

function order(){

if(cart.length===0){
alert("Cart is empty");
return;
}

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let address = document.getElementById("address").value.trim();
let pay = document.querySelector('input[name="pay"]:checked').value;

if(!name || !phone || !address){
alert("Please fill all details");
return;
}

if(!address.toLowerCase().includes("bijnor")){
alert("❌ Delivery available only in Bijnor");
return;
}

let orderItems = [...cart];

let subtotal = orderItems.reduce((s,i)=>s+(i.price*i.qty),0);
let orderCount = Number(localStorage.getItem("orderCount") || 0);

let handlingCharge = orderCount === 0 ? 0 : handling;
let delivery = subtotal >= 500 ? 0 : deliveryCharge;

let total = subtotal + handlingCharge + delivery - discount;

let orderID = generateOrderID();

/* SAVE ORDER */
saveOrder({
id: orderID,
name, phone, address,
items: orderItems,
total,
payment: pay,
date: new Date().toLocaleDateString(),
status:"Pending"
});

/* UPDATE ORDER COUNT */
localStorage.setItem("orderCount", orderCount + 1);

/* WHATSAPP MESSAGE FIXED */
let msg = `🧾 Order ID: ${orderID}\n\n`;

orderItems.forEach(i=>{
msg += `${i.name} x${i.qty} = ₹${i.price*i.qty}\n`;
});

msg += `\nTotal: ₹${total}`;
msg += `\nPayment: ${pay}`;
msg += `\nName: ${name}`;
msg += `\nPhone: ${phone}`;
msg += `\nAddress: ${address}`;

/* OPEN WHATSAPP */
let url = "https://wa.me/919639228237?text=" + encodeURIComponent(msg);
window.location.href = url;

/* CLEAR CART */
localStorage.removeItem("cart");
cart=[];

/* SUCCESS UI */
document.body.innerHTML = `
<div class="success-box">
<div class="success-icon">✅</div>
<h2>Order Placed Successfully</h2>
<p>Order ID: <b>${orderID}</b></p>
<p>Delivery only in Bijnor</p>
<br>
<a href="index.html">
<button class="primary">Go Home</button>
</a>
</div>
`;
}

document.querySelectorAll('input[name="pay"]').forEach(r=>{
r.addEventListener("change",()=>{
document.getElementById("upiBox").style.display =
(r.value==="UPI" && r.checked)?"block":"none";
});
});

showCart();

</script>

</body>
</html>
