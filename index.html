<!DOCTYPE html>
<html>
<head>
<title>Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* GLOBAL */
body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f6fa;
animation:pageFade .5s ease;
}

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
z-index:2000;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#111;
color:#fff;
position:sticky;
top:0;
z-index:100;
}

nav a{
margin:0 10px;
color:#fff;
text-decoration:none;
font-weight:500;
}
nav a:hover{
color:#FFD700;
}

/* LOGO */
.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
background:#222;
color:#fff;
}
.hero button{
padding:10px 20px;
border:none;
background:#FFD700;
cursor:pointer;
border-radius:5px;
font-weight:600;
}

/* FEATURES */
.features{
display:flex;
justify-content:space-around;
padding:30px;
text-align:center;
}
.feature{
background:#fff;
padding:20px;
border-radius:10px;
width:30%;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* PRODUCTS */
.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#fff;
padding:15px;
border-radius:10px;
text-align:center;
transition:.3s;
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

button{
padding:8px 15px;
border:none;
background:#111;
color:#fff;
cursor:pointer;
border-radius:5px;
}
button:hover{
background:#FFD700;
color:#000;
}

/* MINI CART */
.mini-cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#fff;
padding:15px;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
overflow-y:auto;
}

.cart-count{
background:red;
color:#fff;
border-radius:50%;
padding:3px 7px;
font-size:12px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#111;
color:#fff;
margin-top:20px;
}

</style>
</head>

<body>

<div id="loader">Loading...</div>

<header>
<h1 class="logo">Himanshu Electronics</h1>

<nav>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="contact.html">Contact</a>
</nav>

<div onclick="toggleCart()" style="cursor:pointer;">
🛒 <span id="cartCount" class="cart-count">0</span>
</div>
</header>

<!-- HERO -->
<div class="hero">
<h2>Best Bulbs, Fans & Lights</h2>
<p>High-quality electrical products at affordable prices.</p>
<button onclick="location.href='product.html'">Shop Now</button>
</div>

<!-- FEATURES -->
<div class="features">

<div class="feature">
<h3>⚡ Fast Delivery</h3>
<p>Quick & reliable service</p>
</div>

<div class="feature">
<h3>💰 Best Prices</h3>
<p>Affordable & genuine</p>
</div>

<div class="feature">
<h3>📞 Support</h3>
<p>WhatsApp anytime</p>
</div>

</div>

<!-- PRODUCTS -->
<div class="products-grid" id="featured"></div>

<!-- MINI CART -->
<div class="mini-cart" id="miniCart" style="display:none;">
<h3>Your Cart</h3>
<div id="miniItems"></div>
<p id="cartTotal"></p>
<button onclick="location.href='cart.html'">Checkout</button>
</div>

<script>

/* LOADER */
window.onload = ()=>{
document.getElementById("loader").style.display="none";
};

/* PRODUCTS */
let featuredProducts = [
{name:"LED Bulb 9W",price:40,img:"images/led9w.jpg"},
{name:"LED Bulb 12W",price:90,img:"images/led12w.jpg"},
{name:"Master Fan 48 inch",price:1250,img:"images/fan_master48.jpg"},
{name:"Mysore Fan 48 inch",price:1250,img:"images/fan_mysore48.jpg"},
{name:"Havells Panel Light 6W",price:120,img:"images/panel_havells6.jpg"},
{name:"Fybros Panel Light 6W",price:80,img:"images/panel_fybros6.jpg"}
];

let featuredDiv = document.getElementById("featured");

featuredDiv.innerHTML = featuredProducts.map((p,i)=>`
<div class="card">
<img src="${p.img}" alt="${p.name}" onclick="viewFeatured(${i})">
<h3>${p.name}</h3>
<p><b>₹${p.price}</b></p>
<button onclick="viewFeatured(${i})">View</button>
</div>
`).join("");

function viewFeatured(i){
localStorage.setItem("viewProduct", JSON.stringify(featuredProducts[i]));
location.href = "product-view.html";
}

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCartCount(){
let total = cart.reduce((s,p)=>s+(p.qty||1),0);
document.getElementById("cartCount").innerText = total;
}

function toggleCart(){
let c = document.getElementById("miniCart");
c.style.display = c.style.display==="block" ? "none":"block";
showMiniCart();
}

function showMiniCart(){
let div = document.getElementById("miniItems");
let total = 0;

if(cart.length===0){
div.innerHTML="Cart is empty";
document.getElementById("cartTotal").innerText="";
return;
}

div.innerHTML = cart.map((p,i)=>{
total += p.price * (p.qty||1);
return `
<p>${p.name} x${p.qty||1} 
<button onclick="removeItem(${i})">❌</button></p>
`;
}).join("");

document.getElementById("cartTotal").innerText = "Total: ₹"+total;
}

function removeItem(i){
cart.splice(i,1);
localStorage.setItem("cart", JSON.stringify(cart));
updateCartCount();
showMiniCart();
}

updateCartCount();

</script>

</body>
</html>
