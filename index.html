<!DOCTYPE html>
<html>
<head>
<title>Himanshu Electronics - Bulbs, Fans & Lights in Bijnor</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
font-size:20px;
}

/* OFFER */
.offer{
background:#fb641b;
color:#fff;
text-align:center;
padding:8px;
font-weight:500;
}

/* DARK MODE */
.dark{
background:#121212;
color:#fff;
}
.dark .card,
.dark header,
.dark footer{
background:#1e1e1e;
}

/* DARK BUTTON */
.dark-btn{
position:fixed;
top:20px;
right:20px;
background:#000;
color:#fff;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
z-index:1001;
}

/* MINI CART */
.mini-cart{
display:none;
}

</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">Loading...</div>

<!-- OFFER -->
<div class="offer">
🔥 Free Delivery in Bijnor Today
</div>

<!-- DARK MODE -->
<div class="dark-btn" onclick="toggleDark()">🌙</div>

<!-- HEADER -->
<header>
<h2 style="font-weight:600;">Himanshu Electronics</h2>

<nav>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<!-- FLOATING CART -->
<div class="cart-icon" onclick="toggleCart()">
🛒
<span id="cartCount" class="cart-count">0</span>
</div>

<!-- HERO -->
<div class="hero">
<h2>Best Bulbs, Fans & Lights</h2>
<p>Top quality electrical products at best price</p>
<button onclick="location.href='product.html'">Shop Now</button>
</div>

<!-- FEATURED -->
<div class="featured-products">
<h2 style="text-align:center;">Featured Products</h2>
<div class="products-grid" id="featured"></div>
</div>

<!-- MINI CART -->
<div class="mini-cart" id="miniCart">
<h3>Your Cart</h3>
<div id="miniItems"></div>
<button onclick="location.href='cart.html'">Checkout</button>
</div>

<!-- FOOTER -->
<footer>
<p>📧 anisuggestdaily@gmail.com | 📞 +91 9639228237</p>
<p>&copy; 2026 Himanshu Electronics</p>
</footer>

<script>

let featuredProducts = [
{name:"LED Bulb 9W",price:40,img:"images/led9w.jpg"},
{name:"LED Bulb 12W",price:90,img:"images/led12w.jpg"},
{name:"Master Fan 48 inch",price:1250,img:"images/fan_master48.jpg"},
{name:"Mysore Fan 48 inch",price:1250,img:"images/fan_mysore48.jpg"},
{name:"Havells Panel Light 6W",price:120,img:"images/panel_havells6.jpg"},
{name:"Fybros Panel Light 6W",price:80,img:"images/panel_fybros6.jpg"}
];

/* LOAD */
window.onload = ()=>{
document.getElementById("loader").style.display="none";

let featuredDiv = document.getElementById("featured");

featuredDiv.innerHTML = featuredProducts.map((p,i)=>`
<div class="card">
<img src="${p.img}" onclick="viewFeatured(${i})">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button class="primary" onclick="viewFeatured(${i})">View</button>
</div>
`).join("");
};

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark", document.body.classList.contains("dark")?"on":"off");
}

if(localStorage.getItem("dark")==="on"){
document.body.classList.add("dark");
}

/* VIEW */
function viewFeatured(i){
localStorage.setItem("viewProduct", JSON.stringify(featuredProducts[i]));
location.href="product-view.html";
}

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCartCount(){
document.getElementById("cartCount").innerText = cart.reduce((s,p)=>s+(p.qty||1),0);
}

function toggleCart(){
let c=document.getElementById("miniCart");
c.style.display = c.style.display==="block"?"none":"block";
showMiniCart();
}

function showMiniCart(){
let div=document.getElementById("miniItems");
div.innerHTML = cart.map(p=>`<p>${p.name} x${p.qty||1}</p>`).join("");
}

updateCartCount();

</script>

</body>
</html>
