<!DOCTYPE html>
<html>
<body>

<script>
if(prompt("Password")!=="1234"){
document.body.innerHTML="Denied";
}

let orders = JSON.parse(localStorage.getItem("orders")) || [];

document.write("<h2>Total Orders: "+orders.length+"</h2>");

orders.forEach(o=>{
document.write(`
<div style="border:1px solid #000;padding:10px;margin:10px;">
<p><b>${o.name}</b> (${o.phone})</p>
<p>Total: ₹${o.total}</p>
<p>Payment: ${o.payment}</p>
</div>
`);
});
</script>

</body>
</html>
