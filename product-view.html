<!DOCTYPE html>
<html>
<head>
<title>Product Details - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

/* LAYOUT */
.product-page{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
max-width:1000px;
margin:auto;
}

/* IMAGE */
.product-img{
flex:1;
background:#fff;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.product-img img{
width:100%;
max-height:300px;
object-fit:contain;
}

/* DETAILS */
.product-info{
flex:1;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

/* PRICE */
.price{
font-size:22px;
font-weight:600;
color:#388e3c;
margin:10px 0;
}

/* BUTTONS */
.btn-row{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.qty-box{
margin:10px 0;
}

</style>

</head>

<body>

<!-- SOUND -->
<audio id="cartSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1c77.mp3"></audio>

<div class="container" id="view"></div>

<script>

// GET PRODUCT
let p = JSON.parse(localStorage.getItem("viewProduct"));

if(!p){
document.getElementById("view").innerHTML = "<h2>No Product Found</h2>";
}else{

document.getElementById("view").innerHTML = `
<div class="product-page">

<div class="product-img">
<img src="${p.img}" id="productImg">
</div>

<div class="product-info">

<h2>${p.name}</h2>

<p style="color:#f5a623;">⭐⭐⭐⭐☆ (120 reviews)</p>

<p class="price">₹${p.price}</p>

<!-- QTY -->
<div class="qty-box">
<button onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button onclick="changeQty(1)">+</button>
</div>

<div class="btn-row">
<button class="add" onclick="addToCart()">Add to Cart</button>
<button class="primary" onclick="buyNow()">Buy Now</button>
</div>

<br>

<button class="back" onclick="goBack()">⬅ Back</button>

</div>

</div>
`;
}

let quantity = 1;

/* CHANGE QTY */
function changeQty(x){
quantity += x;
if(quantity < 1) quantity = 1;
document.getElementById("qty").innerText = quantity;
}

/* ADD TO CART */
function addToCart(){

let img = document.getElementById("productImg");
let rect = img.getBoundingClientRect();

let flyingImg = img.cloneNode(true);
flyingImg.classList.add("fly-img");

flyingImg.style.top = rect.top + "px";
flyingImg.style.left = rect.left + "px";

document.body.appendChild(flyingImg);

setTimeout(()=>{ flyingImg.remove(); },800);

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({...p, qty: quantity});

localStorage.setItem("cart", JSON.stringify(cart));

let sound = document.getElementById("cartSound");
if(sound){
sound.currentTime = 0;
sound.play().catch(()=>{});
}

alert("Added to Cart 🛒");
}

/* BUY NOW */
function buyNow(){
addToCart();
setTimeout(()=>{
location.href = "cart.html";
},500);
}

/* BACK */
function goBack(){
window.history.back();
}

</script>

</body>
</html>
