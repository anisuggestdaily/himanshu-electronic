<!DOCTYPE html>
<html>
<head>
<title>Product Details - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* PAGE LOAD */
body{animation:fadePage .5s ease;}
@keyframes fadePage{from{opacity:0;}to{opacity:1;}}

/* CARD */
.card{
text-align:center;
animation:fadeUp .6s ease;
}
@keyframes fadeUp{
from{transform:translateY(40px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

/* IMAGE HOVER */
#productImg{
transition:.3s;
cursor:pointer;
}
#productImg:hover{
transform:scale(1.1);
}

/* QTY */
.qty-box{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin:15px 0;
}

/* PRICE */
.price{
font-size:22px;
color:#0A84FF;
font-weight:600;
}

/* MINI CART FIX */
.mini-cart{
display:none;
z-index:2000;
}

.cart-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:1500;
}

</style>

</head>

<body>

<header>
<h2>Himanshu Electronics</h2>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</div>

<div class="cart-icon" onclick="toggleCart()">
🛒
<span id="cartCount" class="cart-count">0</span>
</div>
</header>

<!-- SOUND -->
<audio id="cartSound" preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1c77.mp3">
</audio>

<div class="container" id="view"></div>

<!-- OVERLAY -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

<!-- MINI CART -->
<div class="mini-cart" id="miniCart">

<div style="display:flex;justify-content:space-between;">
<h3>Your Cart</h3>
<button onclick="toggleCart()">❌</button>
</div>

<div id="miniItems"></div>

<button class="primary" onclick="location.href='cart.html'">Checkout</button>
<button style="margin-top:10px;background:#ccc;" onclick="toggleCart()">Continue Shopping</button>

</div>

<script>

/* SOUND FIX */
function playSound(){
let s=document.getElementById("cartSound");
if(!s) return;
s.currentTime=0;
s.play().catch(()=>{});
}

/* GET PRODUCT */
let p = JSON.parse(localStorage.getItem("viewProduct"));

if(!p){
document.getElementById("view").innerHTML = "<h2>No Product Found</h2>";
}else{

document.getElementById("view").innerHTML = `
<div class="card">

<img src="${p.img}" id="productImg">

<h2>${p.name}</h2>
<p class="price">₹${p.price}</p>

<div class="qty-box">
<button onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button onclick="changeQty(1)">+</button>
</div>

<button class="add" onclick="addToCart()">Add to Cart</button>

<br><br>

<button class="primary" onclick="buyNow()">Buy Now</button>

<br><br>

<button class="back" onclick="goBack()">⬅ Back</button>

</div>
`;
}

/* DATA */
let quantity = 1;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* QTY */
function changeQty(x){
quantity += x;
if(quantity < 1) quantity = 1;
document.getElementById("qty").innerText = quantity;
}

/* ADD */
function addToCart(){

let existing = cart.find(i=>i.name===p.name);

if(existing){
existing.qty += quantity;
}else{
cart.push({...p, qty: quantity});
}

localStorage.setItem("cart", JSON.stringify(cart));

updateCartCount();
showMiniCart();

/* SOUND */
playSound();

/* UX */
alert("Added to Cart 🛒");
}

/* BUY */
function buyNow(){
addToCart();
setTimeout(()=>{ location.href="cart.html"; },400);
}

/* BACK */
function goBack(){
window.history.back();
}

/* MINI CART */
function showMiniCart(){
let div=document.getElementById("miniItems");

if(cart.length===0){
div.innerHTML="Cart is empty";
return;
}

let total=0;

div.innerHTML=cart.map(p=>{
let sub=p.price*p.qty;
total+=sub;
return `<p>${p.name} x${p.qty} = ₹${sub}</p>`;
}).join("") + `<h3>Total: ₹${total}</h3>`;
}

/* COUNT */
function updateCartCount(){
document.getElementById("cartCount").innerText =
cart.reduce((s,p)=>s+p.qty,0);
}

/* TOGGLE FIX */
function toggleCart(){
let c=document.getElementById("miniCart");
let o=document.getElementById("cartOverlay");

if(c.style.display==="block"){
c.style.display="none";
o.style.display="none";
}else{
c.style.display="block";
o.style.display="block";
}

showMiniCart();
}

/* INIT */
updateCartCount();

</script>

</body>
</html>
