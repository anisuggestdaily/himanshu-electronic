<!DOCTYPE html>
<html lang="en">
<head>
<title>Product Details - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{font-family:Poppins;}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
color:#fff;
}

.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{
to{background-position:200% center;}
}

/* PRODUCT */
.container{
max-width:900px;
margin:40px auto;
text-align:center;
}

#productImg{
width:250px;
transition:.3s;
}
#productImg:hover{
transform:scale(1.1);
}

.price{
font-size:24px;
color:#0A84FF;
font-weight:600;
margin:10px 0;
}

.qty-box{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
}

button{
padding:10px 15px;
border:none;
background:#111;
color:#fff;
cursor:pointer;
border-radius:5px;
}

/* MINI CART */
.mini-cart{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#fff;
padding:15px;
transition:.3s;
z-index:3000;
}
.mini-cart.open{right:0;}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:2500;
}
.overlay.show{display:block;}

/* FLOATING CART (SYNCED) */
.floating-cart{
position:fixed;
bottom:20px;
right:20px;
background:#FFD700;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
z-index:3500;
}

</style>
</head>

<body>

<header>
<h2 class="logo">Himanshu Electronics</h2>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</div>

<div onclick="toggleCart()" style="cursor:pointer;">
🛒 <span id="cartCount">0</span>
</div>
</header>

<div class="container" id="view"></div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="mini-cart" id="miniCart">
<h3>Your Cart</h3>
<div id="miniItems"></div>
<p id="total"></p>
<button onclick="location.href='cart.html'">Checkout</button>
</div>

<!-- FLOATING CART -->
<div class="floating-cart" onclick="toggleCart()">🛒</div>

<script>

/* GET PRODUCT */
let p = JSON.parse(localStorage.getItem("viewProduct"));

let quantity = 1;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* CHECK IN CART */
function isInCart(){
return cart.find(i=>i.id===p.id);
}

/* RENDER */
if(!p){
view.innerHTML="<h2>No Product Found</h2>";
}else{
view.innerHTML=`
<img src="${p.img}" id="productImg" onerror="this.src='images/default.jpg'">
<h2>${p.name}</h2>
<p class="price">₹${p.price}</p>

<div class="qty-box">
<button onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button onclick="changeQty(1)">+</button>
</div>

<button id="addBtn" onclick="addToCart()">
${isInCart() ? "✅ Added" : "Add to Cart"}
</button>
<br><br>
<button onclick="buyNow()">Buy Now</button>
<br><br>
<button onclick="history.back()">⬅ Back</button>
`;
}

/* QTY */
function changeQty(x){
quantity += x;
if(quantity<1) quantity=1;
qty.innerText=quantity;
}

/* ADD */
function addToCart(){

let btn=document.getElementById("addBtn");

let existing = cart.find(i=>i.id===p.id);

if(existing){
existing.qty += quantity;
}else{
cart.push({...p, qty:quantity});
}

saveCart();
updateCartCount();
renderCart();

/* ANIMATION */
btn.innerText="Added ✔";
setTimeout(()=>{
btn.innerText="✅ Added";
},1000);
}

/* BUY */
function buyNow(){
addToCart();
setTimeout(()=>location.href="cart.html",300);
}

/* CART */
function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCartCount(){
let total = cart.reduce((s,p)=>s+(p.qty||1),0);
cartCount.innerText=total;
}

function toggleCart(){
miniCart.classList.toggle("open");
overlay.classList.toggle("show");
renderCart();
}

function renderCart(){
let total=0;

if(cart.length===0){
miniItems.innerHTML="Cart is empty";
totalEl.innerText="";
return;
}

miniItems.innerHTML = cart.map((p,i)=>{
total += p.price*p.qty;
return `${p.name} x${p.qty} <button onclick="removeItem(${i})">❌</button>`;
}).join("<br>");

total.innerText="Total: ₹"+total;
}

function removeItem(i){
cart.splice(i,1);
saveCart();
updateCartCount();
renderCart();
}

/* INIT */
updateCartCount();
renderCart();

</script>

</body>
</html>
