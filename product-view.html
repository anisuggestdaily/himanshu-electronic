<!DOCTYPE html>
<html lang="en">
<head>
<title>Product Details - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
color:#fff;
}

/* LOGO */
.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{
to{background-position:200% center;}
}

/* PRODUCT */
.container{
max-width:900px;
margin:40px auto;
text-align:center;
}

#productImg{
width:250px;
transition:.3s;
}
#productImg:hover{
transform:scale(1.1);
}

.price{
font-size:24px;
color:#0A84FF;
font-weight:600;
margin:10px 0;
}

/* QTY */
.qty-box{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
}
.qty-box button{
padding:8px 12px;
}

/* BUTTONS */
button{
padding:10px 15px;
border:none;
background:#111;
color:#fff;
cursor:pointer;
border-radius:5px;
}
button:hover{
background:#FFD700;
color:#000;
}

/* MINI CART */
.mini-cart{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#fff;
padding:15px;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
transition:.3s;
z-index:2000;
overflow:auto;
}
.mini-cart.open{right:0;}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1500;
}
.overlay.show{display:block;}

/* ✅ FLOATING CART (FIX ADDED) */
.cart-icon{
position:fixed;
bottom:20px;
right:20px;
background:#fb641b;
color:#fff;
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
cursor:pointer;
z-index:2100;
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

</style>

</head>

<body>

<header>
<h2 class="logo">Himanshu Electronics</h2>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</div>

<div onclick="toggleCart()" style="cursor:pointer;">
🛒 <span id="cartCount">0</span>
</div>
</header>

<audio id="cartSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1c77.mp3">
</audio>

<div class="container" id="view"></div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="mini-cart" id="miniCart">
<h3>Your Cart</h3>
<div id="miniItems"></div>
<p id="total"></p>
<button onclick="location.href='cart.html'">Checkout</button>
</div>

<!-- ✅ FLOATING CART BUTTON -->
<div class="cart-icon" onclick="toggleCart()">
🛒
<span id="floatingCount" class="cart-count">0</span>
</div>

<script>

/* GET PRODUCT */
let p = JSON.parse(localStorage.getItem("viewProduct"));

/* SAFETY */
if(p && p.id === undefined){
p.id = Date.now();
}

/* DATA */
let quantity = 1;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* RENDER */
if(!p){
document.getElementById("view").innerHTML="<h2>No Product Found</h2>";
}else{
document.getElementById("view").innerHTML=`
<img src="${p.img}" id="productImg">
<h2>${p.name}</h2>
<p class="price">₹${p.price}</p>

<div class="qty-box">
<button onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button onclick="changeQty(1)">+</button>
</div>

<button onclick="addToCart()">Add to Cart</button>
<br><br>
<button onclick="buyNow()">Buy Now</button>
<br><br>
<button onclick="history.back()">⬅ Back</button>
`;
}

/* QTY */
function changeQty(x){
quantity += x;
if(quantity<1) quantity=1;
document.getElementById("qty").innerText=quantity;
}

/* ADD */
function addToCart(){
let existing = cart.find(i=>i.id===p.id);

if(existing){
existing.qty += quantity;
}else{
cart.push({...p, qty:quantity});
}

saveCart();
updateCartCount();
renderCart();
playSound();
}

/* BUY */
function buyNow(){
addToCart();
setTimeout(()=>location.href="cart.html",300);
}

/* CART */
function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCartCount(){
let total = cart.reduce((s,p)=>s+(p.qty||1),0);
document.getElementById("cartCount").innerText=total;
document.getElementById("floatingCount").innerText=total;
}

function toggleCart(){
document.getElementById("miniCart").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
renderCart();
}

function renderCart(){
let div=document.getElementById("miniItems");
let total=0;

if(cart.length===0){
div.innerHTML="Cart is empty";
document.getElementById("total").innerText="";
return;
}

div.innerHTML = cart.map((p,i)=>{
total += p.price*p.qty;
return `<p>${p.name} x${p.qty} <button onclick="removeItem(${i})">❌</button></p>`;
}).join("");

document.getElementById("total").innerText="Total: ₹"+total;
}

function removeItem(i){
cart.splice(i,1);
saveCart();
updateCartCount();
renderCart();
}

/* SOUND */
function playSound(){
let s=document.getElementById("cartSound");
s.currentTime=0;
s.play().catch(()=>{});
}

/* INIT */
updateCartCount();
renderCart(); // ✅ FIX: show cart immediately

</script>

</body>
</html>
