<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<link rel="stylesheet" href="style.css">
<style>
body{margin:0;font-family:Poppins,Arial;background:#f5f7fb}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:#0A84FF;color:#fff}
nav a{color:white;margin:0 10px;text-decoration:none;font-weight:500}
h1,h2{text-align:center}
.products-grid{display:flex;flex-wrap:wrap;justify-content:center;padding:20px}
.card{
  width:240px;
  margin:12px;
  padding:15px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
  text-align:center;
  transition:.2s;
}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:150px;object-fit:contain}
button,.btn{
  background:#0A84FF;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  margin-top:5px;
}
input,select,textarea{
  width:90%;
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:1px solid #ccc;
}
.cart-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0A84FF;
  color:#fff;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}
</style>
</head>
<body>

<header>
  <h2>Our Products</h2>
</header>

<input id="search" placeholder="Search..." onkeyup="filter()">

<select id="cat" onchange="filter()">
  <option value="all">All</option>
  <option value="bulb">Bulb</option>
  <option value="fan">Fan</option>
  <option value="light">Light</option>
</select>

<div class="products-grid" id="products"></div>
<a href="cart.html" class="cart-btn">🛒</a>

<script>
const productsDiv = document.getElementById("products");
const search = document.getElementById("search");
const cat = document.getElementById("cat");

let products = [

  /* BULBS */
  {name:"LED Bulb 9W",cat:"bulb",price:40,img:"images/led9w.jpg",desc:"Energy saving LED bulb (Fybros / Orient / GM)"},
  {name:"LED Bulb 12W",cat:"bulb",price:90,img:"images/led12w.jpg",desc:"Bright 12W LED bulb (Orient)"},
  {name:"LED Bulb 15W",cat:"bulb",price:120,img:"images/led15w.jpg",desc:"High brightness 15W LED bulb (Orient)"},
  {name:"LED Bulb 18W",cat:"bulb",price:150,img:"images/led18w.jpg",desc:"Powerful 18W LED bulb (Orient)"},
  {name:"LED Bulb 20W",cat:"bulb",price:170,img:"images/led20w.jpg",desc:"Strong illumination 20W bulb (Fybros)"},
  {name:"LED Bulb 30W",cat:"bulb",price:230,img:"images/led30w.jpg",desc:"Heavy duty 30W LED bulb (Fybros / Orient)"},
  {name:"LED Bulb 50W",cat:"bulb",price:400,img:"images/led50w.jpg",desc:"Ultra bright 50W LED bulb (Fybros)"},

  /* FANS */
  {name:"Master Fan 48 inch",cat:"fan",price:1250,img:"images/fan_master48.jpg",desc:"Durable ceiling fan with smooth airflow"},
  {name:"Mysore Fan 48 inch",cat:"fan",price:1250,img:"images/fan_mysore48.jpg",desc:"Reliable ceiling fan for home use"},
  {name:"Orient Fan 48 inch",cat:"fan",price:1550,img:"images/fan_orient48.jpg",desc:"Premium quality Orient ceiling fan"},
  {name:"Fybros Fan 48 inch",cat:"fan",price:1450,img:"images/fan_fybros48.jpg",desc:"Efficient and durable fan"},
  {name:"Havells Fan 48 inch",cat:"fan",price:1800,img:"images/fan_havells48.jpg",desc:"High performance Havells fan"},
  {name:"Anchor Fan 48 inch",cat:"fan",price:1500,img:"images/fan_anchor48.jpg",desc:"Stable and long lasting fan"},
  {name:"Kent Fan 48 inch",cat:"fan",price:1350,img:"images/fan_kent48.jpg",desc:"Affordable and efficient fan"},
  {name:"Oxaler Fan 48 inch",cat:"fan",price:1250,img:"images/fan_oxaler48.jpg",desc:"Budget friendly ceiling fan"},
  {name:"Murphy Fan 48 inch",cat:"fan",price:1100,img:"images/fan_murphy48.jpg",desc:"Low cost durable fan"},
  {name:"Oxaler Fan 36 inch",cat:"fan",price:1300,img:"images/fan_oxaler36.jpg",desc:"Compact 36 inch ceiling fan"},
  {name:"Oxaler Fan 24 inch",cat:"fan",price:1300,img:"images/fan_oxaler24.jpg",desc:"Small size fan for tight spaces"},
  {name:"Master Pedestal Fan 400mm",cat:"fan",price:1350,img:"images/pedestal_master400.jpg",desc:"Portable pedestal fan with adjustable height"},
  {name:"Mysore Pedestal Fan 400mm",cat:"fan",price:1450,img:"images/pedestal_mysore400.jpg",desc:"Strong airflow pedestal fan"},
  {name:"Exhaust Fan 12 inch",cat:"fan",price:1200,img:"images/exhaust12.jpg",desc:"Copper motor exhaust fan (Freshair)"},
  {name:"Exhaust Fan 9 inch",cat:"fan",price:1100,img:"images/exhaust9.jpg",desc:"Medium size exhaust fan"},
  {name:"Exhaust Fan 6 inch",cat:"fan",price:1100,img:"images/exhaust6.jpg",desc:"Compact exhaust fan"},

  /* LIGHTS */
  {name:"Havells Panel Light 6W",cat:"light",price:120,img:"images/panel_havells6.jpg",desc:"Havells Luna 6W Downlight with 4KV protection"},
  {name:"Fybros Panel Light 6W",cat:"light",price:80,img:"images/panel_fybros6.jpg",desc:"Energy efficient LED panel light"},
  {name:"Orient Panel Light 5W",cat:"light",price:80,img:"images/panel_orient5.jpg",desc:"Compact 5W LED panel"},
  {name:"Orient Tube Light 20W",cat:"light",price:299,img:"images/tube_orient20.jpg",desc:"Bright and long lasting tube light"}
];

// Save products (optional)
localStorage.setItem("products", JSON.stringify(products));

function show(list){
  productsDiv.innerHTML = list.map(p=>`
    <div class="card">
      <img src="${p.img}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <p><b>₹${p.price}</b></p>
      <button onclick="add('${p.name}',${p.price})">Add to Cart</button>
    </div>`).join("");
}

function filter(){
  let sVal = search.value.toLowerCase();
  let cVal = cat.value;
  let f = products.filter(p => 
    p.name.toLowerCase().includes(sVal) &&
    (cVal==="all" || p.cat===cVal)
  );
  show(f);
}

function add(name,price){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({name,price});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

// Initial display
show(products);
</script>

</body>
</html>
