<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Our Products</h2>
</header>

<input id="search" placeholder="Search..." onkeyup="filter()">

<select id="cat" onchange="filter()">
  <option value="all">All</option>
  <option value="bulb">Bulb</option>
  <option value="fan">Fan</option>
  <option value="light">Light</option>
</select>

<div class="products-grid" id="products"></div>
<a href="cart.html" class="cart-btn">🛒</a>

<script>
const handling = 9;

// define elements
const productsDiv = document.getElementById("products");
const search = document.getElementById("search");
const cat = document.getElementById("cat");

let products = [

  /* ================= BULBS ================= */
  {name:"LED Bulb 9W",cat:"bulb",price:40,img:"https://images.pexels.com/photos/256348/pexels-photo-256348.jpeg",desc:"Energy saving LED bulb"},
  {name:"LED Bulb 12W",cat:"bulb",price:90,img:"https://images.pexels.com/photos/256348/pexels-photo-256348.jpeg",desc:"Bright 12W LED bulb"},
  {name:"LED Bulb 15W",cat:"bulb",price:120,img:"https://images.pexels.com/photos/256348/pexels-photo-256348.jpeg",desc:"High brightness 15W LED bulb"},
  {name:"LED Bulb 18W",cat:"bulb",price:150,img:"https://images.pexels.com/photos/256348/pexels-photo-256348.jpeg",desc:"Powerful 18W LED bulb"},
  {name:"LED Bulb 20W",cat:"bulb",price:170,img:"https://images.pexels.com/photos/256348/pexels-photo-256348.jpeg",desc:"Strong illumination 20W bulb"},
  {name:"LED Bulb 30W",cat:"bulb",price:230,img:"https://images.pexels.com/photos/256348/pexels-photo-256348.jpeg",desc:"Heavy duty 30W LED bulb"},
  {name:"LED Bulb 50W",cat:"bulb",price:400,img:"https://images.pexels.com/photos/256348/pexels-photo-256348.jpeg",desc:"Ultra bright 50W LED bulb"},

  /* ================= FANS ================= */
  {name:"Master Fan 48 inch",cat:"fan",price:1250,img:"https://images.pexels.com/photos/3758922/pexels-photo-3758922.jpeg",desc:"Durable ceiling fan with smooth airflow"},
  {name:"Mysore Fan 48 inch",cat:"fan",price:1250,img:"https://images.pexels.com/photos/3758922/pexels-photo-3758922.jpeg",desc:"Reliable ceiling fan"},
  {name:"Orient Fan 48 inch",cat:"fan",price:1550,img:"https://images.pexels.com/photos/3758922/pexels-photo-3758922.jpeg",desc:"Premium quality ceiling fan"},
  {name:"Fybros Fan 48 inch",cat:"fan",price:1450,img:"https://images.pexels.com/photos/3758922/pexels-photo-3758922.jpeg",desc:"Efficient and durable fan"},
  {name:"Havells Fan 48 inch",cat:"fan",price:1800,img:"https://images.pexels.com/photos/3758922/pexels-photo-3758922.jpeg",desc:"High performance fan"},
  {name:"Anchor Fan 48 inch",cat:"fan",price:1500,img:"https://images.pexels.com/photos/3758922/pexels-photo-3758922.jpeg",desc:"Stable and long lasting fan"},
  {name:"Kent Fan 48 inch",cat:"fan",price:1350,img:"https://images.pexels.com/photos/3758922/pexels-photo-3758922.jpeg",desc:"Affordable ceiling fan"},
  {name:"Oxaler Fan 48 inch",cat:"fan",price:1250,img:"https://images.pexels.com/photos/3758922/pexels-photo-3758922.jpeg",desc:"Budget friendly ceiling fan"},
  {name:"Murphy Fan 48 inch",cat:"fan",price:1100,img:"https://images.pexels.com/photos/3758922/pexels-photo-3758922.jpeg",desc:"Low cost durable fan"},

  /* ================= LIGHTS ================= */
  {name:"Havells Panel Light 6W",cat:"light",price:120,img:"https://images.pexels.com/photos/373946/pexels-photo-373946.jpeg",desc:"Panel Light 6W"},
  {name:"Fybros Panel Light 6W",cat:"light",price:80,img:"https://images.pexels.com/photos/373946/pexels-photo-373946.jpeg",desc:"LED panel light"},
  {name:"Orient Panel Light 5W",cat:"light",price:80,img:"https://images.pexels.com/photos/373946/pexels-photo-373946.jpeg",desc:"Compact LED panel"},
  {name:"Orient Tube Light 20W",cat:"light",price:299,img:"https://images.pexels.com/photos/373946/pexels-photo-373946.jpeg",desc:"Bright tube light"}

];

localStorage.setItem("products", JSON.stringify(products));

function show(list){
  productsDiv.innerHTML = list.map(p=>`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <p><b>₹${p.price}</b></p>
      <p>+ ₹9 handling</p>
      <button onclick="add('${p.name}',${p.price})">Add to Cart</button>
    </div>`).join("");
}

function filter(){
  let sVal = search.value.toLowerCase();
  let cVal = cat.value;

  let f = products.filter(p =>
    p.name.toLowerCase().includes(sVal) &&
    (cVal==="all" || p.cat===cVal)
  );

  show(f);
}

function add(name,price){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({name,price:price+handling});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

show(products);

</script>

</body>
</html>
