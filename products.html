<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h2>All Products</h2>
</header>

<!-- SEARCH + FILTER -->
<input id="search" placeholder="Search products..." onkeyup="filter()">

<select id="cat" onchange="filter()">
<option value="all">All</option>
<option value="light">Light</option>
<option value="bulb">Bulb</option>
<option value="fan">Fan</option>
<option value="wire">Wire</option>
<option value="switch">Switch</option>
</select>

<div class="products-grid" id="products"></div>

<a href="cart.html" class="cart-btn">🛒</a>

<script>
const handling = 9;

// LOAD PRODUCTS
let products = JSON.parse(localStorage.getItem("products"));

if(!products){
products = [

/* 🔌 LIGHTS */
{name:"Havells LED Panel Light 6W",cat:"light",company:"Havells",price:120,img:"https://m.media-amazon.com/images/I/61dP6sJz6LL._SL1500_.jpg"},
{name:"Fybros LED Panel Light 6W",cat:"light",company:"Fybros",price:80,img:"https://m.media-amazon.com/images/I/61k9z0X4HSL._SL1500_.jpg"},
{name:"Orient LED Panel Light 5W",cat:"light",company:"Orient",price:80,img:"https://m.media-amazon.com/images/I/61k9z0X4HSL._SL1500_.jpg"},
{name:"Orient Tube Light 20W",cat:"light",company:"Orient",price:299,img:"https://m.media-amazon.com/images/I/61XH7dF0g-L._SL1500_.jpg"},

/* 💡 BULBS */
{name:"Havells LED Bulb 9W",cat:"bulb",company:"Havells",price:90,img:"https://m.media-amazon.com/images/I/71V9i+6Tq-L._SL1500_.jpg"},
{name:"Orient LED Bulb 12W",cat:"bulb",company:"Orient",price:120,img:"https://m.media-amazon.com/images/I/61cQ0XQK4zL._SL1500_.jpg"},

/* 🌀 FANS */
{name:"Orient Ceiling Fan 48 inch",cat:"fan",company:"Orient",price:1800,img:"https://m.media-amazon.com/images/I/61s+8R9+5QL._SL1500_.jpg"},
{name:"Havells Ceiling Fan 1200mm",cat:"fan",company:"Havells",price:2200,img:"https://m.media-amazon.com/images/I/71mX4WATh-L._SL1500_.jpg"},

/* 🔌 FUTURE READY (you can edit later) */
{name:"Copper Wire 1.5mm",cat:"wire",company:"Polycab",price:900,img:"https://m.media-amazon.com/images/I/61Z1F0kG3VL._SL1500_.jpg"},
{name:"Anchor Switch Board",cat:"switch",company:"Anchor",price:150,img:"https://m.media-amazon.com/images/I/51u7L8V3g-L._SL1000_.jpg"}

];

localStorage.setItem("products", JSON.stringify(products));
}

// SHOW PRODUCTS
function show(list){
productsDiv.innerHTML = list.map(p=>`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<p>+ ₹9 handling</p>
<button onclick="add('${p.name}',${p.price})">Add to Cart</button>
</div>`).join("");
}

// FILTER SYSTEM
function filter(){
let s = search.value.toLowerCase();
let c = cat.value;

let filtered = products.filter(p =>
p.name.toLowerCase().includes(s) &&
(c==="all" || p.cat===c)
);

show(filtered);
}

// ADD TO CART
function add(name,price){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
cart.push({name,price:price + handling});
localStorage.setItem("cart", JSON.stringify(cart));
alert("Added to cart");
}

// INIT
show(products);
</script>

</body>
</html>
