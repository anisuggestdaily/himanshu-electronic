<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Our Products</h2>
</header>

<input id="search" placeholder="Search..." onkeyup="filter()">

<select id="cat" onchange="filter()">
  <option value="all">All</option>
  <option value="bulb">Bulb</option>
  <option value="fan">Fan</option>
  <option value="light">Light</option>
</select>

<div class="products-grid" id="products"></div>
<a href="cart.html" class="cart-btn">🛒</a>

<script>
const handling = 9;

// Define elements
const productsDiv = document.getElementById("products");
const search = document.getElementById("search");
const cat = document.getElementById("cat");

let products = [

  /* ================= BULBS ================= */

  {name:"LED Bulb 18W",cat:"bulb",price:150,img:"https://i.ibb.co/2kT7dGf/bulb1.png",desc:"Powerful 18W LED bulb (Orient)"},
  {name:"LED Bulb 20W",cat:"bulb",price:170,img:"https://i.ibb.co/2kT7dGf/bulb1.png",desc:"Strong illumination 20W bulb (Fybros)"},
  {name:"LED Bulb 30W",cat:"bulb",price:230,img:"https://i.ibb.co/2kT7dGf/bulb1.png",desc:"Heavy duty 30W LED bulb (Fybros / Orient)"},
  {name:"LED Bulb 50W",cat:"bulb",price:400,img:"https://i.ibb.co/2kT7dGf/bulb1.png",desc:"Ultra bright 50W LED bulb (Fybros)"},

  /* ================= FANS ================= */
  {name:"Master Fan 48 inch",cat:"fan",price:1250,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"Durable ceiling fan with smooth airflow"},
  {name:"Mysore Fan 48 inch",cat:"fan",price:1250,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"Reliable ceiling fan for home use"},
  {name:"Orient Fan 48 inch",cat:"fan",price:1550,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"Premium quality Orient ceiling fan"},
  {name:"Fybros Fan 48 inch",cat:"fan",price:1450,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"Efficient and durable fan"},
  {name:"Havells Fan 48 inch",cat:"fan",price:1800,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"High performance Havells fan"},
  {name:"Anchor Fan 48 inch",cat:"fan",price:1500,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"Stable and long lasting fan"},
  {name:"Kent Fan 48 inch",cat:"fan",price:1350,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"Affordable and efficient fan"},
  {name:"Oxaler Fan 48 inch",cat:"fan",price:1250,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"Budget friendly ceiling fan"},
  {name:"Murphy Fan 48 inch",cat:"fan",price:1100,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"Low cost durable fan"},
  {name:"Oxaler Fan 36 inch",cat:"fan",price:1300,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"Compact 36 inch ceiling fan"},
  {name:"Oxaler Fan 24 inch",cat:"fan",price:1300,img:"https://i.ibb.co/QD0sD3Q/fan1.png",desc:"Small size fan for tight spaces"},
  {name:"Master Pedestal Fan 400mm",cat:"fan",price:1350,img:"https://i.ibb.co/Y7kL6Cs/fan2.png",desc:"Portable pedestal fan with adjustable height"},
  {name:"Mysore Pedestal Fan 400mm",cat:"fan",price:1450,img:"https://i.ibb.co/Y7kL6Cs/fan2.png",desc:"Strong airflow pedestal fan"},
  {name:"Exhaust Fan 12 inch",cat:"fan",price:1200,img:"https://i.ibb.co/Y7kL6Cs/fan2.png",desc:"Copper motor exhaust fan (Freshair)"},
  {name:"Exhaust Fan 9 inch",cat:"fan",price:1100,img:"https://i.ibb.co/Y7kL6Cs/fan2.png",desc:"Medium size exhaust fan"},
  {name:"Exhaust Fan 6 inch",cat:"fan",price:1100,img:"https://i.ibb.co/Y7kL6Cs/fan2.png",desc:"Compact exhaust fan"},

  /* ================= LIGHTS ================= */
  {name:"Havells Panel Light 6W",cat:"light",price:120,img:"https://i.ibb.co/0BBg1cq/light1.png",desc:"Havells Luna 6W Downlight with 4KV protection"},
  {name:"Fybros Panel Light 6W",cat:"light",price:80,img:"https://i.ibb.co/0BBg1cq/light1.png",desc:"Energy efficient LED panel light"},
  {name:"Orient Panel Light 5W",cat:"light",price:80,img:"https://i.ibb.co/0BBg1cq/light1.png",desc:"Compact 5W LED panel"},
  {name:"Orient Tube Light 20W",cat:"light",price:299,img:"https://i.ibb.co/0BBg1cq/light1.png",desc:"Bright and long lasting tube light"}

];

localStorage.setItem("products", JSON.stringify(products));

function show(list){
  productsDiv.innerHTML = list.map(p=>`
    <div class="card">
      <img src="${p.img}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <p><b>₹${p.price}</b></p>
      <p>+ ₹9 handling</p>
      <button onclick="add('${p.name}',${p.price})">Add to Cart</button>
    </div>`).join("");
}

function filter(){
  let sVal = search.value.toLowerCase();
  let cVal = cat.value;

  let f = products.filter(p =>
    p.name.toLowerCase().includes(sVal) &&
    (cVal==="all" || p.cat===cVal)
  );

  show(f);
}

function add(name,price){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({name,price:price+handling});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

// Initial display
show(products);

</script>

</body>
</html>
