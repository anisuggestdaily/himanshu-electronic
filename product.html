<!DOCTYPE html>
<html lang="en">
<head>
<title>Products - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* SAME YOUR STYLE (NO CHANGE) */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
color:#fff;
}

.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{to{background-position:200% center;}}

nav a{
color:#fff;
margin:0 10px;
text-decoration:none;
}

.controls{
max-width:900px;
margin:20px auto;
display:flex;
gap:10px;
}
.controls input,.controls select{
padding:10px;
width:100%;
border-radius:5px;
border:1px solid #ccc;
}

.card{
position:relative;
transition:.3s;
}
.card:hover{transform:translateY(-5px);}

.wish-btn{
position:absolute;
top:10px;
right:10px;
background:#fff;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.wish-active{color:red;}

.rating{color:#f5a623;font-size:14px;}

.mini-cart{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#fff;
padding:15px;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
transition:.3s;
z-index:2000;
overflow:auto;
}
.mini-cart.open{right:0;}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1500;
}
.overlay.show{display:block;}

button{
padding:8px 12px;
border:none;
background:#111;
color:#fff;
cursor:pointer;
border-radius:5px;
}
button:hover{
background:#FFD700;
color:#000;
}

.floating-cart{
position:fixed;
bottom:20px;
right:20px;
background:#FFD700;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
z-index:3000;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
animation:bounce 2s infinite;
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-5px);}
}

</style>
</head>

<body>

<!-- ✅ MENU ADDED -->
<div class="side-menu" id="menu">
<h3>Menu</h3>
<a href="order-history.html">📦 Order History</a>
<a href="#">🌙 Toggle Mode</a>
<a href="contact.html">📞 Contact</a>
</div>

<header>

<div style="display:flex;align-items:center;">
<div onclick="toggleMenu()" style="cursor:pointer;font-size:22px;">☰</div>
<h2 class="logo">Himanshu Electronics</h2>
</div>

<nav>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="contact.html">Contact</a>
</nav>

<div onclick="toggleCart()" style="cursor:pointer;">
🛒 <span id="cartCount">0</span>
</div>

</header>

<audio id="cartSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1c77.mp3">
</audio>

<h2 style="text-align:center;">Our Products</h2>

<div class="controls">
<input id="search" placeholder="🔍 Search..." onkeyup="filter()">
<select id="cat" onchange="filter()">
<option value="all">All</option>
<option value="bulb">Bulbs</option>
<option value="fan">Fans</option>
<option value="light">Lights</option>
</select>
</div>

<div class="products-grid" id="products"></div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="mini-cart" id="miniCart">
<h3>Your Cart</h3>
<div id="miniItems"></div>
<p id="total"></p>
<button onclick="location.href='cart.html'">Checkout</button>
</div>

<div class="floating-cart" onclick="toggleCart()">
🛒 <span id="floatingCount" class="cart-count">0</span>
</div>

<script>

/* MENU */
function toggleMenu(){
menu.classList.toggle("open");
overlay.classList.toggle("show");
}
function closeAll(){
miniCart.classList.remove("open");
menu.classList.remove("open");
overlay.classList.remove("show");
}

/* PRODUCTS */
let defaultProducts = [/* SAME YOUR FULL LIST */];

let defaultWithId = defaultProducts.map((p,i)=>({...p,id:"d-"+i}));

/* ✅ FIX ADMIN PRODUCTS */
let adminProducts = JSON.parse(localStorage.getItem("adminProducts")) || [];
adminProducts = adminProducts.map((p,i)=>({...p,id:p.id || "a-"+i}));

let products = [...defaultWithId,...adminProducts];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

/* SHOW */
function showProducts(list=products){
document.getElementById("products").innerHTML = list.map(p=>{
let inCart = cart.find(c=>c.id===p.id);
let inWish = wishlist.includes(p.id);

return `
<div class="card">
<div class="wish-btn ${inWish?'wish-active':''}" onclick="toggleWish('${p.id}')">❤</div>

<img src="${p.img}" onclick="viewProduct('${p.id}')">

<h3>${p.name}</h3>
<p>₹${p.price}</p>

<p class="rating">⭐ ${(Math.random()*0.8+4.1).toFixed(1)}</p>

<button onclick="addToCart('${p.id}')">
${inCart ? "✅ Added" : "Add to Cart"}
</button>
</div>`;
}).join("");
}

/* CART WITH QUANTITY */
function renderCart(){
let div=document.getElementById("miniItems");
let total=0;

if(cart.length===0){
div.innerHTML="Cart is empty";
totalDiv.innerText="";
return;
}

div.innerHTML = cart.map(p=>{
total+=p.price*p.qty;
return `
<p>
${p.name}<br>
<button onclick="changeQty('${p.id}',-1)">➖</button>
${p.qty}
<button onclick="changeQty('${p.id}',1)">➕</button>
<button onclick="removeItem('${p.id}')">❌</button>
</p>`;
}).join("");

totalDiv.innerText="Total: ₹"+total;
}

function changeQty(id,val){
let item=cart.find(p=>p.id==id);
item.qty+=val;
if(item.qty<=0) cart=cart.filter(p=>p.id!==id);
saveCart();
renderCart();
updateCartCount();
}

function removeItem(id){
cart=cart.filter(p=>p.id!==id);
saveCart();
renderCart();
updateCartCount();
}

/* REST SAME */
function saveCart(){localStorage.setItem("cart",JSON.stringify(cart));}
function updateCartCount(){
let t=cart.reduce((s,p)=>s+(p.qty||1),0);
cartCount.innerText=t;
floatingCount.innerText=t;
}
function toggleCart(){
miniCart.classList.toggle("open");
overlay.classList.toggle("show");
renderCart();
}
function addToCart(id){
let item=products.find(p=>p.id==id);
let ex=cart.find(p=>p.id==id);
if(ex) ex.qty++; else cart.push({...item,qty:1});
saveCart();updateCartCount();renderCart();showProducts();playSound();
}
function toggleWish(id){
if(wishlist.includes(id)) wishlist=wishlist.filter(w=>w!==id);
else wishlist.push(id);
localStorage.setItem("wishlist",JSON.stringify(wishlist));
showProducts();
}
function playSound(){let s=cartSound;s.currentTime=0;s.play().catch(()=>{});}
function viewProduct(id){
localStorage.setItem("viewProduct",JSON.stringify(products.find(p=>p.id==id)));
location.href="product-view.html";
}
function filter(){
let s=search.value.toLowerCase();
let c=cat.value;
showProducts(products.filter(p=>p.name.toLowerCase().includes(s)&&(c==="all"||p.cat===c)));
}

/* INIT */
let totalDiv=document.getElementById("total");
showProducts();
updateCartCount();

</script>

</body>
                          </html>
