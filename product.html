<!DOCTYPE html>
<html lang="en">
<head>
<title>Products - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
color:#fff;
z-index:1000;
position:sticky;
top:0;
}

/* LOGO */
.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{to{background-position:200% center;}}

nav a{
color:#fff;
margin:0 10px;
text-decoration:none;
}

/* 3 DOT MENU */
.menu-btn{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.menu-box{
position:absolute;
top:60px;
right:20px;
background:#fff;
color:#000;
padding:10px;
border-radius:8px;
display:none;
z-index:2000;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
.menu-box a{
display:block;
padding:8px;
color:#000;
text-decoration:none;
}
.menu-box a:hover{
background:#FFD700;
}

/* SEARCH */
.controls{
max-width:900px;
margin:20px auto;
display:flex;
gap:10px;
}
.controls input,.controls select{
padding:10px;
width:100%;
border-radius:5px;
border:1px solid #ccc;
}

/* CARD */
.card{
position:relative;
transition:.3s;
}
.card:hover{transform:translateY(-5px);}

/* SCROLL ANIMATION */
.fade-in{
opacity:0;
transform:translateY(20px);
transition:.6s;
}
.fade-in.show{
opacity:1;
transform:translateY(0);
}

/* WISHLIST */
.wish-btn{
position:absolute;
top:10px;
right:10px;
background:#fff;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.wish-active{color:red;}

.rating{color:#f5a623;font-size:14px;}

/* MINI CART */
.mini-cart{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#fff;
padding:15px;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
transition:.3s;
z-index:3000;
overflow:auto;
}
.mini-cart.open{right:0;}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:2000;
}
.overlay.show{display:block;}

button{
padding:8px 12px;
border:none;
background:#111;
color:#fff;
cursor:pointer;
border-radius:5px;
transition:.2s;
}
button:hover{
background:#FFD700;
color:#000;
}
button:active{
transform:scale(0.95);
}

/* FLOATING CART */
.floating-cart{
position:fixed;
bottom:20px;
right:20px;
background:#FFD700;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
z-index:4000;
animation:floatCart 2s infinite;
}

@keyframes floatCart{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

/* FOOTER */
footer{
background:#111;
color:#fff;
text-align:center;
padding:20px;
margin-top:40px;
}

/* INPUT FOCUS */
input:focus,select:focus{
outline:none;
border:1px solid #FFD700;
box-shadow:0 0 5px rgba(255,215,0,0.5);
}

</style>
</head>

<body>

<header>

<div style="display:flex;align-items:center;">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<h2 class="logo">Himanshu Electronics</h2>
</div>

<nav>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="contact.html">Contact</a>
</nav>

<div onclick="toggleCart()" style="cursor:pointer;">
🛒 <span id="cartCount">0</span>
</div>

</header>

<!-- MENU -->
<div class="menu-box" id="menuBox">
<a href="order-history.html">📦 Orders</a>
<a href="contact.html">📞 Contact</a>
</div>

<audio id="cartSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1c77.mp3">
</audio>

<h2 style="text-align:center;">Our Products</h2>

<div class="controls">
<input id="search" placeholder="🔍 Search..." onkeyup="filter()">
<select id="cat" onchange="filter()">
<option value="all">All</option>
<option value="bulb">Bulbs</option>
<option value="fan">Fans</option>
<option value="light">Lights</option>
</select>
</div>

<div class="products-grid" id="products"></div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="mini-cart" id="miniCart">
<h3>Your Cart</h3>
<div id="miniItems"></div>
<p id="total"></p>
<button onclick="location.href='cart.html'">Checkout</button>
</div>

<div class="floating-cart" onclick="toggleCart()">
🛒 <span id="floatingCount" class="cart-count">0</span>
</div>

<footer>
<p>📞 +91 9639228237</p>
<p>📧 anisuggestdaily@gmail.com</p>
<p>© 2026 Himanshu Electronics</p>
</footer>

<script>

/* MENU */
function toggleMenu(){
let m=document.getElementById("menuBox");
m.style.display = (m.style.display==="block") ? "none" : "block";
}

/* PRODUCTS SAME AS YOUR FILE */
let defaultProducts = [
{name:"LED Bulb 9W",cat:"bulb",price:40,img:"images/led9w.jpg"},
{name:"LED Bulb 12W",cat:"bulb",price:90,img:"images/led12w.jpg"},
{name:"LED Bulb 15W",cat:"bulb",price:120,img:"images/led15w.jpg"},
{name:"LED Bulb 18W",cat:"bulb",price:150,img:"images/led18w.jpg"},
{name:"LED Bulb 20W",cat:"bulb",price:170,img:"images/led20w.jpg"},
{name:"LED Bulb 30W",cat:"bulb",price:230,img:"images/led30w.jpg"},
{name:"LED Bulb 50W",cat:"bulb",price:400,img:"images/led50w.jpg"},
{name:"Master Fan 48 inch",cat:"fan",price:1250,img:"images/fan_master48.jpg"},
{name:"Mysore Fan 48 inch",cat:"fan",price:1250,img:"images/fan_mysore48.jpg"},
{name:"Orient Fan 48 inch",cat:"fan",price:1550,img:"images/fan_orient48.jpg"},
{name:"Fybros Fan 48 inch",cat:"fan",price:1450,img:"images/fan_fybros48.jpg"},
{name:"Havells Fan 48 inch",cat:"fan",price:1800,img:"images/fan_havells48.jpg"},
{name:"Anchor Fan 48 inch",cat:"fan",price:1500,img:"images/fan_anchor48.jpg"},
{name:"Kent Fan 48 inch",cat:"fan",price:1350,img:"images/fan_kent48.jpg"},
{name:"Oxaler Fan 48 inch",cat:"fan",price:1250,img:"images/fan_oxaler48.jpg"},
{name:"Murphy Fan 48 inch",cat:"fan",price:1100,img:"images/fan_murphy48.jpg"},
{name:"Oxaler Fan 36 inch",cat:"fan",price:1300,img:"images/fan_oxaler36.jpg"},
{name:"Oxaler Fan 24 inch",cat:"fan",price:1300,img:"images/fan_oxaler24.jpg"},
{name:"Master Pedestal Fan 400mm",cat:"fan",price:1350,img:"images/pedestal_master400.jpg"},
{name:"Mysore Pedestal Fan 400mm",cat:"fan",price:1450,img:"images/pedestal_mysore400.jpg"},
{name:"Exhaust Fan 12 inch",cat:"fan",price:1200,img:"images/exhaust12.jpg"},
{name:"Exhaust Fan 9 inch",cat:"fan",price:1100,img:"images/exhaust9.jpg"},
{name:"Exhaust Fan 6 inch",cat:"fan",price:1100,img:"images/exhaust6.jpg"},
{name:"Havells Panel Light 6W",cat:"light",price:120,img:"images/panel_havells6.jpg"},
{name:"Fybros Panel Light 6W",cat:"light",price:80,img:"images/panel_fybros6.jpg"},
{name:"Orient Panel Light 5W",cat:"light",price:80,img:"images/panel_orient5.jpg"},
{name:"Orient Tube Light 20W",cat:"light",price:299,img:"images/tube_orient20.jpg"}
];

let defaultWithId = defaultProducts.map((p,i)=>({...p,id:"d-"+i}));
let adminProducts = JSON.parse(localStorage.getItem("adminProducts")) || [];
let products = [...defaultWithId,...adminProducts];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showProducts(list=products){
document.getElementById("products").innerHTML = list.map(p=>`
<div class="card fade-in">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addToCart('${p.id}')">Add to Cart</button>
</div>
`).join("");
}

function addToCart(id){
let item = products.find(p=>p.id==id);
let existing = cart.find(p=>p.id==id);

if(existing){existing.qty++;}
else{cart.push({...item,qty:1});}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
renderCart();
showProducts();
}

/* CART */
function updateCartCount(){
let total=cart.reduce((s,p)=>s+(p.qty||1),0);
document.getElementById("cartCount").innerText=total;
document.getElementById("floatingCount").innerText=total;
}

function toggleCart(){
miniCart.classList.toggle("open");
overlay.classList.toggle("show");
renderCart();
}

function renderCart(){
let div=miniItems;
let total=0;

if(cart.length===0){
div.innerHTML="Cart is empty";
return;
}

div.innerHTML=cart.map((p,i)=>{
total+=p.price*p.qty;
return `<p>${p.name} (${p.qty}) <button onclick="removeItem(${i})">❌</button></p>`;
}).join("");

document.getElementById("total").innerText="Total ₹"+total;
}

function removeItem(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
renderCart();
}

/* SCROLL ANIMATION */
window.addEventListener("scroll",()=>{
document.querySelectorAll(".fade-in").forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-50){
el.classList.add("show");
}
});
});

showProducts();
updateCartCount();

</script>

</body>
</html>
