<!DOCTYPE html>
<html lang="en">
<head>
<title>Products - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
color:#fff;
}

/* LOGO ANIMATION */
.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{
to{background-position:200% center;}
}

nav a{
color:#fff;
margin:0 10px;
text-decoration:none;
}

/* SEARCH */
.controls{
max-width:900px;
margin:20px auto;
display:flex;
gap:10px;
}
.controls input,.controls select{
padding:10px;
width:100%;
border-radius:5px;
border:1px solid #ccc;
}

/* CARD */
.card{
position:relative;
}

/* WISHLIST */
.wish-btn{
position:absolute;
top:10px;
right:10px;
background:#fff;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.wish-active{color:red;}

.rating{color:#f5a623;font-size:14px;}

/* CART */
.mini-cart{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#fff;
padding:15px;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
transition:.3s;
z-index:2000;
overflow:auto;
}
.mini-cart.open{right:0;}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1500;
}
.overlay.show{display:block;}

button{
padding:8px 12px;
border:none;
background:#111;
color:#fff;
cursor:pointer;
border-radius:5px;
}
button:hover{
background:#FFD700;
color:#000;
}

/* ✅ FLOATING CART */
.floating-cart{
position:fixed;
bottom:20px;
right:20px;
background:#FFD700;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
z-index:3000;
}

</style>
</head>

<body>

<header>
<h2 class="logo">Himanshu Electronics</h2>

<nav>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
</nav>

<div onclick="toggleCart()" style="cursor:pointer;">
🛒 <span id="cartCount">0</span>
</div>
</header>

<audio id="cartSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1c77.mp3">
</audio>

<h2 style="text-align:center;">Our Products</h2>

<div class="controls">
<input id="search" placeholder="🔍 Search..." onkeyup="filter()">
<select id="cat" onchange="filter()">
<option value="all">All</option>
<option value="bulb">Bulbs</option>
<option value="fan">Fans</option>
<option value="light">Lights</option>
</select>
</div>

<div class="products-grid" id="products"></div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="mini-cart" id="miniCart">
<h3>Your Cart</h3>
<div id="miniItems"></div>
<p id="total"></p>
<button onclick="location.href='cart.html'">Checkout</button>
</div>

<!-- ✅ FLOATING CART BUTTON -->
<div class="floating-cart" onclick="toggleCart()">🛒</div>

<script>

/* ========================= */
/* LOAD PRODUCTS */
/* ========================= */

let defaultProducts = [

{name:"LED Bulb 9W",cat:"bulb",price:40,img:"images/led9w.jpg"},
{name:"LED Bulb 12W",cat:"bulb",price:90,img:"images/led12w.jpg"},
{name:"LED Bulb 15W",cat:"bulb",price:120,img:"images/led15w.jpg"},
{name:"LED Bulb 18W",cat:"bulb",price:150,img:"images/led18w.jpg"},
{name:"LED Bulb 20W",cat:"bulb",price:170,img:"images/led20w.jpg"},
{name:"LED Bulb 30W",cat:"bulb",price:230,img:"images/led30w.jpg"},
{name:"LED Bulb 50W",cat:"bulb",price:400,img:"images/led50w.jpg"},

{name:"Master Fan 48 inch",cat:"fan",price:1250,img:"images/fan_master48.jpg"},
{name:"Mysore Fan 48 inch",cat:"fan",price:1250,img:"images/fan_mysore48.jpg"},
{name:"Orient Fan 48 inch",cat:"fan",price:1550,img:"images/fan_orient48.jpg"},
{name:"Fybros Fan 48 inch",cat:"fan",price:1450,img:"images/fan_fybros48.jpg"},
{name:"Havells Fan 48 inch",cat:"fan",price:1800,img:"images/fan_havells48.jpg"},
{name:"Anchor Fan 48 inch",cat:"fan",price:1500,img:"images/fan_anchor48.jpg"},
{name:"Kent Fan 48 inch",cat:"fan",price:1350,img:"images/fan_kent48.jpg"},
{name:"Oxaler Fan 48 inch",cat:"fan",price:1250,img:"images/fan_oxaler48.jpg"},
{name:"Murphy Fan 48 inch",cat:"fan",price:1100,img:"images/fan_murphy48.jpg"},

{name:"Oxaler Fan 36 inch",cat:"fan",price:1300,img:"images/fan_oxaler36.jpg"},
{name:"Oxaler Fan 24 inch",cat:"fan",price:1300,img:"images/fan_oxaler24.jpg"},

{name:"Master Pedestal Fan 400mm",cat:"fan",price:1350,img:"images/pedestal_master400.jpg"},
{name:"Mysore Pedestal Fan 400mm",cat:"fan",price:1450,img:"images/pedestal_mysore400.jpg"},

{name:"Exhaust Fan 12 inch",cat:"fan",price:1200,img:"images/exhaust12.jpg"},
{name:"Exhaust Fan 9 inch",cat:"fan",price:1100,img:"images/exhaust9.jpg"},
{name:"Exhaust Fan 6 inch",cat:"fan",price:1100,img:"images/exhaust6.jpg"},

{name:"Havells Panel Light 6W",cat:"light",price:120,img:"images/panel_havells6.jpg"},
{name:"Fybros Panel Light 6W",cat:"light",price:80,img:"images/panel_fybros6.jpg"},
{name:"Orient Panel Light 5W",cat:"light",price:80,img:"images/panel_orient5.jpg"},
{name:"Orient Tube Light 20W",cat:"light",price:299,img:"images/tube_orient20.jpg"}

];

let defaultWithId = defaultProducts.map((p,i)=>({...p,id:i}));
let adminProducts = JSON.parse(localStorage.getItem("adminProducts")) || [];
let products = [...defaultWithId, ...adminProducts];

/* STATE */
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

/* SHOW PRODUCTS */
function showProducts(list=products){

document.getElementById("products").innerHTML = list.map(p=>{

let inCart = cart.find(c=>c.id===p.id);
let inWish = wishlist.includes(p.id);

return `
<div class="card">

<div class="wish-btn ${inWish?'wish-active':''}" onclick="toggleWish(${p.id})">❤</div>

<img src="${p.img}" onerror="this.src='images/default.jpg'" onclick="viewProduct(${p.id})">

<h3>${p.name}</h3>
<p>₹${p.price}</p>

<p class="rating">⭐ ${(Math.random()*0.8+4.1).toFixed(1)}</p>

<button onclick="addToCart(${p.id})">
${inCart ? "✅ Added" : "Add to Cart"}
</button>

</div>
`;

}).join("");
}

/* ADD TO CART */
function addToCart(id){

let item = products.find(p=>p.id===id);
let existing = cart.find(p=>p.id===id);

if(existing){
existing.qty++;
}else{
cart.push({...item, qty:1});
}

saveCart();
updateCartCount();
renderCart();
showProducts();
playSound();
}

/* VIEW */
function viewProduct(id){
let item = products.find(p=>p.id===id);
localStorage.setItem("viewProduct", JSON.stringify(item));
location.href="product-view.html";
}

/* FILTER */
function filter(){

let s=document.getElementById("search").value.toLowerCase();
let c=document.getElementById("cat").value;

let filtered = products.filter(p =>
p.name.toLowerCase().includes(s) &&
(c==="all" || p.cat===c)
);

showProducts(filtered);
}

/* CART */
function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCartCount(){
let total = cart.reduce((s,p)=>s+(p.qty||1),0);
document.getElementById("cartCount").innerText = total;
}

function toggleCart(){
document.getElementById("miniCart").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
renderCart();
}

function renderCart(){

let div=document.getElementById("miniItems");
let total=0;

if(cart.length===0){
div.innerHTML="Cart is empty";
document.getElementById("total").innerText="";
updateCartCount();
return;
}

div.innerHTML = cart.map((p,i)=>{
total += p.price * p.qty;
return `<p>${p.name} x${p.qty} <button onclick="removeItem(${i})">❌</button></p>`;
}).join("");

document.getElementById("total").innerText="Total: ₹"+total.toLocaleString("en-IN");
updateCartCount();
}

function removeItem(i){
cart.splice(i,1);
saveCart();
updateCartCount();
renderCart();
}

/* WISHLIST */
function toggleWish(id){
if(wishlist.includes(id)){
wishlist = wishlist.filter(x=>x!==id);
}else{
wishlist.push(id);
}
localStorage.setItem("wishlist", JSON.stringify(wishlist));
showProducts();
}

/* SOUND */
function playSound(){
let s=document.getElementById("cartSound");
s.currentTime=0;
s.play().catch(()=>{});
}

/* INIT */
showProducts();
updateCartCount();

</script>

</body>
</html>
