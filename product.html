<!DOCTYPE html>
<html lang="en">
<head>
<title>Products - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
<h3>Menu</h3>
<a href="order-history.html">📦 Order History</a>
<a href="#" onclick="toggleDark()">🌙 Toggle Mode</a>
<a href="contact.html">📞 Contact</a>
</div>

<header>
<div style="display:flex;align-items:center;">
<div onclick="toggleMenu()" style="cursor:pointer;font-size:22px;">☰</div>
<h2 class="logo" style="margin-left:10px;">Himanshu Electronics</h2>
</div>

<nav>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="contact.html">Contact</a>
</nav>

<div onclick="toggleCart()" style="cursor:pointer;">
🛒 <span id="cartCount" class="cart-count">0</span>
</div>
</header>

<audio id="cartSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1c77.mp3">
</audio>

<h2 style="text-align:center;">Our Products</h2>

<div class="controls">
<input id="search" placeholder="🔍 Search..." onkeyup="filter()">
<select id="cat" onchange="filter()">
<option value="all">All</option>
<option value="bulb">Bulbs</option>
<option value="fan">Fans</option>
<option value="light">Lights</option>
</select>
</div>

<div class="products-grid" id="products"></div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="mini-cart" id="miniCart">
<h3>Your Cart</h3>
<div id="miniItems"></div>
<p id="total"></p>
<button class="primary" onclick="location.href='cart.html'">Checkout</button>
</div>

<!-- FLOATING CART -->
<div class="floating-cart" onclick="toggleCart()">
🛒 <span id="floatingCount" class="cart-count">0</span>
</div>

<script>

/* ========================= */
/* MENU */
/* ========================= */
function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
}

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* CLOSE */
function closeAll(){
document.getElementById("miniCart").classList.remove("open");
document.getElementById("menu").classList.remove("open");
document.getElementById("overlay").classList.remove("show");
}

/* ========================= */
/* PRODUCTS */
/* ========================= */

let defaultProducts = [
{name:"LED Bulb 9W",cat:"bulb",price:40,img:"images/led9w.jpg"},
{name:"LED Bulb 12W",cat:"bulb",price:90,img:"images/led12w.jpg"},
{name:"LED Bulb 15W",cat:"bulb",price:120,img:"images/led15w.jpg"},
{name:"LED Bulb 18W",cat:"bulb",price:150,img:"images/led18w.jpg"},
{name:"LED Bulb 20W",cat:"bulb",price:170,img:"images/led20w.jpg"},
{name:"LED Bulb 30W",cat:"bulb",price:230,img:"images/led30w.jpg"},
{name:"LED Bulb 50W",cat:"bulb",price:400,img:"images/led50w.jpg"},

{name:"Master Fan 48 inch",cat:"fan",price:1250,img:"images/fan_master48.jpg"},
{name:"Mysore Fan 48 inch",cat:"fan",price:1250,img:"images/fan_mysore48.jpg"},
{name:"Orient Fan 48 inch",cat:"fan",price:1550,img:"images/fan_orient48.jpg"},
{name:"Fybros Fan 48 inch",cat:"fan",price:1450,img:"images/fan_fybros48.jpg"},
{name:"Havells Fan 48 inch",cat:"fan",price:1800,img:"images/fan_havells48.jpg"},
{name:"Anchor Fan 48 inch",cat:"fan",price:1500,img:"images/fan_anchor48.jpg"},
{name:"Kent Fan 48 inch",cat:"fan",price:1350,img:"images/fan_kent48.jpg"},
{name:"Oxaler Fan 48 inch",cat:"fan",price:1250,img:"images/fan_oxaler48.jpg"},
{name:"Murphy Fan 48 inch",cat:"fan",price:1100,img:"images/fan_murphy48.jpg"},

{name:"Oxaler Fan 36 inch",cat:"fan",price:1300,img:"images/fan_oxaler36.jpg"},
{name:"Oxaler Fan 24 inch",cat:"fan",price:1300,img:"images/fan_oxaler24.jpg"},

{name:"Master Pedestal Fan 400mm",cat:"fan",price:1350,img:"images/pedestal_master400.jpg"},
{name:"Mysore Pedestal Fan 400mm",cat:"fan",price:1450,img:"images/pedestal_mysore400.jpg"},

{name:"Exhaust Fan 12 inch",cat:"fan",price:1200,img:"images/exhaust12.jpg"},
{name:"Exhaust Fan 9 inch",cat:"fan",price:1100,img:"images/exhaust9.jpg"},
{name:"Exhaust Fan 6 inch",cat:"fan",price:1100,img:"images/exhaust6.jpg"},

{name:"Havells Panel Light 6W",cat:"light",price:120,img:"images/panel_havells6.jpg"},
{name:"Fybros Panel Light 6W",cat:"light",price:80,img:"images/panel_fybros6.jpg"},
{name:"Orient Panel Light 5W",cat:"light",price:80,img:"images/panel_orient5.jpg"},
{name:"Orient Tube Light 20W",cat:"light",price:299,img:"images/tube_orient20.jpg"}
];

/* ADD ID TO ALL PRODUCTS */
let defaultWithId = defaultProducts.map((p,i)=>({...p,id:"d-"+i}));

let adminProducts = JSON.parse(localStorage.getItem("adminProducts")) || [];

/* FIX: ADD ID TO ADMIN PRODUCTS */
adminProducts = adminProducts.map((p,i)=>({...p,id:p.id || "a-"+i}));

let products = [...defaultWithId, ...adminProducts];

/* ========================= */
/* STATE */
/* ========================= */

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

/* ========================= */
/* SHOW PRODUCTS */
/* ========================= */

function showProducts(list=products){

document.getElementById("products").innerHTML = list.map(p=>{

let inCart = cart.find(c=>c.id===p.id);
let inWish = wishlist.includes(p.id);

return `
<div class="card">

<div class="wish-btn ${inWish?'wish-active':''}" onclick="toggleWish('${p.id}')">❤</div>

<img src="${p.img}" onclick="viewProduct('${p.id}')">

<h3>${p.name}</h3>
<p>₹${p.price}</p>

<p class="rating">⭐ ${(Math.random()*0.8+4.1).toFixed(1)}</p>

<button class="add" onclick="addToCart('${p.id}')">
${inCart ? "✅ Added" : "Add to Cart"}
</button>

</div>
`;

}).join("");
}

/* ADD TO CART */
function addToCart(id){
let item = products.find(p=>p.id==id);
let existing = cart.find(p=>p.id==id);

if(existing){
existing.qty++;
}else{
cart.push({...item, qty:1});
}

saveCart();
updateCartCount();
renderCart();
showProducts();
playSound();
}

/* WISHLIST FIX */
function toggleWish(id){
if(wishlist.includes(id)){
wishlist = wishlist.filter(w=>w!==id);
}else{
wishlist.push(id);
}
localStorage.setItem("wishlist", JSON.stringify(wishlist));
showProducts();
}

/* FILTER */
function filter(){
let s=document.getElementById("search").value.toLowerCase();
let c=document.getElementById("cat").value;

let filtered = products.filter(p =>
p.name.toLowerCase().includes(s) &&
(c==="all" || p.cat===c)
);

showProducts(filtered);
}

/* CART */
function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

/* SYNC CART ACROSS PAGES */
window.addEventListener("storage", ()=>{
cart = JSON.parse(localStorage.getItem("cart")) || [];
updateCartCount();
renderCart();
});

function updateCartCount(){
let total = cart.reduce((s,p)=>s+(p.qty||1),0);
document.getElementById("cartCount").innerText = total;
document.getElementById("floatingCount").innerText = total;
}

function toggleCart(){
document.getElementById("miniCart").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
renderCart();
}

/* FIXED MINI CART WITH QUANTITY */
function renderCart(){

let div=document.getElementById("miniItems");
let total=0;

if(cart.length===0){
div.innerHTML="Cart is empty";
document.getElementById("total").innerText="";
return;
}

div.innerHTML = cart.map(p=>{
total += p.price * p.qty;
return `
<p>
${p.name} <br>
<button onclick="changeQty('${p.id}',-1)">➖</button>
${p.qty}
<button onclick="changeQty('${p.id}',1)">➕</button>
<button class="danger" onclick="removeItem('${p.id}')">❌</button>
</p>`;
}).join("");

document.getElementById("total").innerText="Total: ₹"+total;
}

function changeQty(id,change){
let item = cart.find(p=>p.id==id);
if(!item) return;

item.qty += change;

if(item.qty<=0){
cart = cart.filter(p=>p.id!==id);
}

saveCart();
updateCartCount();
renderCart();
}

/* REMOVE BY ID */
function removeItem(id){
cart = cart.filter(p=>p.id!==id);
saveCart();
updateCartCount();
renderCart();
}

/* SOUND */
function playSound(){
let s=document.getElementById("cartSound");
s.currentTime=0;
s.play().catch(()=>{});
}

/* INIT */
showProducts();
updateCartCount();

</script>

</body>
</html>
