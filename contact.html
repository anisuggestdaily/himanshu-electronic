<!DOCTYPE html>
<html>
<head>
<title>Contact Us - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

/* LAYOUT */
.contact-page{
display:flex;
flex-wrap:wrap;
gap:20px;
}

/* LEFT */
.contact-form{
flex:1;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

/* RIGHT */
.contact-info{
flex:1;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<header>
<h2 style="font-weight:600;">Himanshu Electronics</h2>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="contact.html">Contact</a>
</div>
</header>

<div class="container">

<h2 style="text-align:center;">📞 Contact Us</h2>

<p style="text-align:center;">We’re here to help you with your orders and queries.</p>

<div class="contact-page">

<!-- LEFT (FORM) -->
<div class="contact-form">

<h3>Send Message</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="email" id="email" placeholder="Your Email">
<textarea rows="4" id="message" placeholder="Your Message"></textarea>

<button class="primary" onclick="sendMsg()">Send Message</button>

<br><br>

<a class="whatsapp" href="https://wa.me/919639228237?text=Hello%20I%20need%20help%20with%20an%20order" target="_blank">
💬 Order Help on WhatsApp
</a>

<br><br>

<a class="whatsapp" href="tel:919639228237">
📞 Call Now
</a>

</div>

<!-- RIGHT (INFO) -->
<div class="contact-info">

<h3>Our Details</h3>

<p>📍 
<a href="https://maps.app.goo.gl/1mjHmsXPFQnc4VxT6" target="_blank">
View Location on Google Maps
</a>
</p>

<p>📞 Phone: +91 9639228237</p>
<p>📧 Email: anisuggestdaily@gmail.com</p>

<br>

<a class="whatsapp" href="https://wa.me/919639228237" target="_blank">
Chat on WhatsApp
</a>

</div>

</div>

</div>

<script>

/* SEND MESSAGE TO WHATSAPP */
function sendMsg(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let msg = document.getElementById("message").value.trim();

if(!name || !email || !msg){
alert("Please fill all fields");
return;
}

/* FORMAT */
let text = "📩 New Contact Message:%0A%0A";
text += "Name: "+name+"%0A";
text += "Email: "+email+"%0A";
text += "Message: "+msg;

/* OPEN WHATSAPP */
window.open("https://wa.me/919639228237?text="+text);

}

</script>

</body>
</html>
