<div class="container">

<h2>Contact Us</h2>

<p>If you have any questions or want to order, feel free to contact us.</p>

<!-- CONTACT FORM -->
<input type="text" id="name" placeholder="Your Name">
<input type="email" id="email" placeholder="Your Email">
<textarea rows="4" id="message" placeholder="Your Message"></textarea>

<button onclick="sendMsg()">Send Message</button>

<br><br>

<!-- 🔥 QUICK ACTIONS -->
<a class="whatsapp" href="https://wa.me/919639228237?text=Hello%20I%20need%20help%20with%20an%20order" target="_blank">
💬 Order Help
</a>

<br><br>

<a class="whatsapp" href="tel:919639228237">
📞 Call Now
</a>

<!-- CONTACT INFO -->
<div class="info">
<h3>Our Details</h3>

<p>📍 Address: 
<a href="https://maps.app.goo.gl/1mjHmsXPFQnc4VxT6" target="_blank">
View Location on Google Maps
</a>
</p>

<p>📞 Phone: +91 9639228237</p>
<p>📧 Email: anisuggestdaily@gmail.com</p>

<a class="whatsapp" href="https://wa.me/919639228237" target="_blank">
Chat on WhatsApp
</a>
</div>

</div>

<script>

/* SEND MESSAGE TO WHATSAPP */
function sendMsg(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let msg = document.getElementById("message").value.trim();

if(!name || !email || !msg){
alert("Please fill all fields");
return;
}

/* FORMAT MESSAGE (FIXED ENCODING) */
let text = "📩 New Contact Message:\n\n";
text += "Name: "+name+"\n";
text += "Email: "+email+"\n";
text += "Message: "+msg;

/* ENCODE TEXT (IMPORTANT FIX) */
let url = "https://wa.me/919639228237?text=" + encodeURIComponent(text);

/* OPEN WHATSAPP */
window.open(url);

}

</script>

</body>
