<!DOCTYPE html>
<html>
<head>
<title>Contact Us - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* PAGE LOAD */
body{animation:fadePage .5s ease;}
@keyframes fadePage{from{opacity:0;}to{opacity:1;}}

/* LAYOUT */
.contact-page{
display:flex;
flex-wrap:wrap;
gap:20px;
}

/* CARD STYLE */
.contact-form,
.contact-info{
flex:1;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
transition:.3s;
animation:fadeUp .6s ease;
}

/* HOVER EFFECT */
.contact-form:hover,
.contact-info:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

/* INPUT FOCUS */
input:focus, textarea:focus{
outline:none;
border:1px solid #0A84FF;
box-shadow:0 0 5px rgba(10,132,255,.3);
}

/* BUTTON EFFECT */
button{
position:relative;
overflow:hidden;
}
button::after{
content:"";
position:absolute;
width:100%;
height:100%;
top:0;
left:-100%;
background:rgba(255,255,255,.4);
transition:.4s;
}
button:hover::after{
left:100%;
}

/* TITLE ANIMATION */
h2{
animation:fadeDown .6s ease;
}

/* ANIMATIONS */
@keyframes fadeUp{
from{transform:translateY(40px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

@keyframes fadeDown{
from{transform:translateY(-30px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

/* MOBILE */
@media(max-width:768px){
.contact-page{
flex-direction:column;
}
}

</style>

</head>

<body>

<header>
<h2 style="font-weight:600;">Himanshu Electronics</h2>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="contact.html">Contact</a>
</div>
</header>

<div class="container">

<h2 style="text-align:center;">📞 Contact Us</h2>

<p style="text-align:center;">We’re here to help you with your orders and queries.</p>

<div class="contact-page">

<!-- LEFT -->
<div class="contact-form">

<h3>Send Message</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="email" id="email" placeholder="Your Email">
<textarea rows="4" id="message" placeholder="Your Message"></textarea>

<button class="primary" onclick="sendMsg()">Send Message</button>

<br><br>

<a class="whatsapp" href="https://wa.me/919639228237?text=Hello%20I%20need%20help%20with%20an%20order" target="_blank">
💬 Order Help on WhatsApp
</a>

<br><br>

<a class="whatsapp" href="tel:919639228237">
📞 Call Now
</a>

</div>

<!-- RIGHT -->
<div class="contact-info">

<h3>Our Details</h3>

<p>📍 
<a href="https://maps.app.goo.gl/1mjHmsXPFQnc4VxT6" target="_blank">
View Location on Google Maps
</a>
</p>

<p>📞 Phone: +91 9639228237</p>
<p>📧 Email: anisuggestdaily@gmail.com</p>

<br>

<a class="whatsapp" href="https://wa.me/919639228237" target="_blank">
Chat on WhatsApp
</a>

</div>

</div>

</div>

<script>

/* SEND MESSAGE */
function sendMsg(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let msg = document.getElementById("message").value.trim();

if(!name || !email || !msg){
alert("Please fill all fields");
return;
}

/* FORMAT */
let text = "📩 New Contact Message:%0A%0A";
text += "Name: "+name+"%0A";
text += "Email: "+email+"%0A";
text += "Message: "+msg;

/* OPEN WHATSAPP */
window.open("https://wa.me/919639228237?text="+text);

/* UX IMPROVEMENT */
alert("Message sent to WhatsApp 👍");

/* CLEAR FORM */
document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("message").value="";
}

</script>

</body>
</html>
