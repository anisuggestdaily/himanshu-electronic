<!DOCTYPE html>
<html lang="en">
<head>
<title>Contact Us - Himanshu Electronics</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
color:#fff;
}

/* LOGO (SYNCED) */
.logo{
font-size:22px;
font-weight:700;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{to{background-position:200% center;}}

/* PAGE */
body{
animation:fadePage .5s ease;
background:#f5f6fa;
font-family:'Poppins',sans-serif;
}
@keyframes fadePage{from{opacity:0;}to{opacity:1;}}

/* LAYOUT */
.contact-page{
display:flex;
flex-wrap:wrap;
gap:20px;
}

/* CARDS */
.contact-form,
.contact-info{
flex:1;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
transition:.3s;
}

/* HOVER */
.contact-form:hover,
.contact-info:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

/* INPUT */
input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

input:focus, textarea:focus{
outline:none;
border:1px solid #0A84FF;
box-shadow:0 0 5px rgba(10,132,255,.3);
}

/* BUTTON */
button{
padding:10px 15px;
border:none;
background:#111;
color:#fff;
cursor:pointer;
border-radius:5px;
width:100%;
}
button:hover{
background:#FFD700;
color:#000;
}

/* LINKS AS BUTTON */
.action-btn{
display:block;
margin:10px 0;
padding:10px;
border-radius:6px;
text-align:center;
text-decoration:none;
background:#25D366;
color:#fff;
}
.call-btn{background:#0A84FF;}

/* MOBILE */
@media(max-width:768px){
.contact-page{
flex-direction:column;
}
}

</style>

</head>

<body>

<header>
<h2 class="logo">Himanshu Electronics</h2>

<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="contact.html">Contact</a>
</div>
</header>

<div class="container">

<h2 style="text-align:center;">📞 Contact Us</h2>
<p style="text-align:center;">We’re here to help you with your orders and queries.</p>

<div class="contact-page">

<!-- LEFT -->
<div class="contact-form">

<h3>Send Message</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="email" id="email" placeholder="Your Email">
<textarea rows="4" id="message" placeholder="Your Message"></textarea>

<button onclick="sendMsg()">Send Message</button>

<br><br>

<a class="action-btn" href="https://wa.me/919639228237?text=Hello%20I%20need%20help%20with%20an%20order" target="_blank">
💬 Order Help on WhatsApp
</a>

<a class="action-btn call-btn" href="tel:919639228237">
📞 Call Now
</a>

</div>

<!-- RIGHT -->
<div class="contact-info">

<h3>Our Details</h3>

<p>📍 
<a href="https://maps.app.goo.gl/1mjHmsXPFQnc4VxT6" target="_blank">
View Location on Google Maps
</a>
</p>

<p>📞 Phone: +91 9639228237</p>
<p>📧 Email: anisuggestdaily@gmail.com</p>

<br>

<a class="action-btn" href="https://wa.me/919639228237" target="_blank">
Chat on WhatsApp
</a>

</div>

</div>

</div>

<script>

/* SEND MESSAGE */
function sendMsg(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let msg = document.getElementById("message").value.trim();

if(!name || !email || !msg){
alert("Please fill all fields");
return;
}

let text = `📩 *New Contact Message*\n\n👤 Name: ${name}\n📧 Email: ${email}\n📝 Message: ${msg}`;

window.open("https://wa.me/919639228237?text=" + encodeURIComponent(text));

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("message").value="";
}

</script>

</body>
</html>
